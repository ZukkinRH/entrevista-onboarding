                        const progressValue = pdi.status === 'pendente' ? 0 : pdi.status === 'em_andamento' ? 50 : 100;
                        const progressClass = 'progress-' + progressValue;

                        html += '<div class="card">';
                        html += '<div class="card-header">';
                        html += '<div>';
                        html += '<div class="card-title">' + pdi.titulo + '</div>';
                        html += '<span class="badge badge-' + pdi.status + '">' + pdi.status + '</span>';
                        html += '</div>';
                        html += '<button class="btn btn-primary btn-small" onclick="viewPDI(\'' + doc.id + '\')">Visualizar</button>';
                        html += '</div>';
                        html += '<div class="progress-bar">';
                        html += '<div class="progress-bar-fill ' + progressClass + '" style="width: ' + progressValue + '%"></div>';
                        html += '</div>';
                        html += '<p style="margin-top: 10px; font-size: 12px; color: #636E72;">Progresso: ' + progressValue + '%</p>';
                        html += '</div>';
                    });
                }

                listContainer.innerHTML = html;
            } catch (error) {
                console.error('Erro ao carregar PDIs do colaborador:', error);
            }
        }

        async function loadPDIGestorAnalista() {
            const container = document.getElementById('pdiContainer');
            container.innerHTML = '<button class="btn btn-primary" onclick="openPDIForm()">+ Novo PDI</button>';

            try {
                const [myPdis, subordinados] = await Promise.all([
                    cachedGet('pdis:user:' + currentUser.id, () =>
                        db.collection('pdis').where('colaborador_id', '==', currentUser.id).get()),
                    cachedGet('usuarios:subordinados:' + currentUser.id, () =>
                        db.collection('usuarios').where('gestor_id', '==', currentUser.id).get())
                ]);

                const subordinadoIds = [];
                subordinados.forEach(doc => {
                    subordinadoIds.push(doc.id);
                });

                let teamPdis = [];
                if (subordinadoIds.length > 0) {
                    const teamDocsSnap = await db.collection('pdis')
                        .where('colaborador_id', 'in', subordinadoIds)
                        .get();
                    teamDocsSnap.forEach(doc => {
                        teamPdis.push({ id: doc.id, ...doc.data() });
                    });
                }

                let html = '';

                // Meu PDI
                html += '<h3 style="margin-top: 20px; margin-bottom: 15px;">Meu PDI</h3>';
                if (myPdis.empty) {
                    html += '<div class="alert alert-info">Você ainda não tem um PDI.</div>';
                } else {
                    myPdis.forEach(doc => {
                        const pdi = doc.data();
                        const progressValue = pdi.status === 'pendente' ? 0 : pdi.status === 'em_andamento' ? 50 : 100;
                        const progressClass = 'progress-' + progressValue;

                        html += '<div class="card">';
                        html += '<div class="card-header">';
                        html += '<div>';
                        html += '<div class="card-title">' + pdi.titulo + '</div>';
                        html += '<span class="badge badge-' + pdi.status + '">' + pdi.status + '</span>';
                        html += '</div>';
                        html += '<button class="btn btn-primary btn-small" onclick="viewPDI(\'' + doc.id + '\')">Visualizar</button>';
                        html += '</div>';
                        html += '<div class="progress-bar">';
                        html += '<div class="progress-bar-fill ' + progressClass + '" style="width: ' + progressValue + '%"></div>';
                        html += '</div>';
                        html += '<p style="margin-top: 10px; font-size: 12px; color: #636E72;">Progresso: ' + progressValue + '%</p>';
                        html += '</div>';
                    });
                }

                // PDI da Equipe
                html += '<h3 style="margin-top: 30px; margin-bottom: 15px;">PDI da Minha Equipe</h3>';
                if (teamPdis.length === 0) {
                    html += '<div class="alert alert-info">Nenhum PDI encontrado para sua equipe.</div>';
                } else {
                    teamPdis.forEach(pdi => {
                        const progressValue = pdi.status === 'pendente' ? 0 : pdi.status === 'em_andamento' ? 50 : 100;
                        const progressClass = 'progress-' + progressValue;

                        html += '<div class="card">';
                        html += '<div class="card-header">';
                        html += '<div>';
                        html += '<div class="card-title">' + pdi.titulo + '</div>';
                        html += '<span class="badge badge-' + pdi.status + '">' + pdi.status + '</span>';
                        html += '</div>';
                        html += '<button class="btn btn-primary btn-small" onclick="viewPDI(\'' + pdi.id + '\')">Visualizar</button>';
                        html += '</div>';
                        html += '<div class="progress-bar">';
                        html += '<div class="progress-bar-fill ' + progressClass + '" style="width: ' + progressValue + '%"></div>';
                        html += '</div>';
                        html += '<p style="margin-top: 10px; font-size: 12px; color: #636E72;">Progresso: ' + progressValue + '%</p>';
                        html += '</div>';
                    });
                }

                container.innerHTML = '<button class="btn btn-primary" onclick="openPDIForm()">+ Novo PDI</button>' + html;
            } catch (error) {
                console.error('Erro ao carregar PDIs do gestor/analista:', error);
            }
        }

        async function loadPDIAdmin() {
            const container = document.getElementById('pdiContainer');
            container.innerHTML = '<button class="btn btn-primary" onclick="openPDIForm()">+ Novo PDI</button><div id="pdiList"></div>';

            try {
                const pdis = await cachedGet('pdis:all', () => db.collection('pdis').get());
                const listContainer = document.getElementById('pdiList');
                let html = '';

                if (pdis.empty) {
                    html = '<div class="alert alert-info">Nenhum PDI encontrado.</div>';
                } else {
                    pdis.forEach(doc => {
                        const pdi = doc.data();
                        const progressValue = pdi.status === 'pendente' ? 0 : pdi.status === 'em_andamento' ? 50 : 100;
                        const progressClass = 'progress-' + progressValue;

                        html += '<div class="card">';
                        html += '<div class="card-header">';
                        html += '<div>';
                        html += '<div class="card-title">' + pdi.titulo + '</div>';
                        html += '<span class="badge badge-' + pdi.status + '">' + pdi.status + '</span>';
                        html += '</div>';
                        html += '<button class="btn btn-primary btn-small" onclick="viewPDI(\'' + doc.id + '\')">Visualizar</button>';
                        html += '</div>';
                        html += '<div class="progress-bar">';
                        html += '<div class="progress-bar-fill ' + progressClass + '" style="width: ' + progressValue + '%"></div>';
                        html += '</div>';
                        html += '<p style="margin-top: 10px; font-size: 12px; color: #636E72;">Progresso: ' + progressValue + '%</p>';
                        html += '</div>';
                    });
                }

                listContainer.innerHTML = html;
            } catch (error) {
                console.error('Erro ao carregar PDIs do admin:', error);
            }
        }

        function openPDIForm() {
            let html = `
                <div class="pdi-form-section">
                    <label>Título do PDI:</label>
                    <input type="text" id="pdiTitulo" placeholder="Título do plano de desenvolvimento">
                </div>
                <div class="pdi-form-section">
                    <label>Descrição:</label>
                    <textarea id="pdiDescricao" placeholder="Descreva os objetivos do PDI"></textarea>
                </div>
                <div class="pdi-form-section">
                    <label>Colaborador:</label>
                    <select id="pdiColaborador">
                        <option value="">-- Selecione um colaborador --</option>
                    </select>
                </div>
                <div class="pdi-form-section">
                    <label>Status:</label>
                    <select id="pdiStatus">
                        <option value="pendente">Pendente</option>
                        <option value="em_andamento">Em Andamento</option>
                        <option value="concluido">Concluído</option>
                    </select>
                </div>
            `;

            openModal('Novo PDI', html, [
                { text: 'Cancelar', onclick: 'closeModal()', class: 'btn-secondary' },
                { text: 'Salvar', onclick: 'savePDI()', class: 'btn-primary' }
            ]);

            // Load collaborators
            loadPDIColaboradorSelect();
        }

        async function loadPDIColaboradorSelect() {
            try {
                const select = document.getElementById('pdiColaborador');
                if (!select) return;

                const usuarios = await cachedGet('usuarios:all', () => db.collection('usuarios').get());
                usuarios.forEach(doc => {
                    if (doc.id !== currentUser.id) {
                        const option = document.createElement('option');
                        option.value = doc.id;
                        const u = doc.data();
                        option.textContent = u.nome + ' (' + (u.perfil || '') + ')';
                        select.appendChild(option);
                    }
                });
            } catch (error) {
                console.error('Erro ao carregar colaboradores:', error);
            }
        }

        async function savePDI() {
            const titulo = document.getElementById('pdiTitulo').value;
            const descricao = document.getElementById('pdiDescricao').value;
            const colaboradorId = document.getElementById('pdiColaborador').value;
            const status = document.getElementById('pdiStatus').value;

            if (!titulo || !colaboradorId) {
                showToast('warn', 'Campos obrigatórios', 'Preencha título e colaborador.');
                return;
            }

            try {
                await db.collection('pdis').add({
                    titulo: titulo,
                    descricao: descricao,
                    colaborador_id: colaboradorId,
                    criador_id: currentUser.id,
                    status: status,
                    data_criacao: new Date(),
                    atualizacoes: []
                });
                invalidateCache('pdis:');

                showToast('success', 'PDI criado!', 'Plano de desenvolvimento registrado com sucesso.');
                closeModal();
                loadPDI();
            } catch (error) {
                console.error('Erro ao criar PDI:', error);
                showToast('error', 'Erro ao criar PDI', error.message);
            }
        }

        async function viewPDI(pdiId) {
            try {
                const doc = await db.collection('pdis').doc(pdiId).get();
                const pdi = doc.data();

                let html = `
                    <div class="pdi-form-section">
                        <strong>Título:</strong> ${pdi.titulo}
                    </div>
                    <div class="pdi-form-section">
                        <strong>Descrição:</strong> ${pdi.descricao}
                    </div>
                    <div class="pdi-form-section">
                        <strong>Status:</strong> <span class="badge badge-${pdi.status}">${pdi.status}</span>
                    </div>
                    <div class="pdi-form-section">
                        <strong>Data de Criação:</strong> ${formatDate(pdi.data_criacao)}
                    </div>
                `;

                // Show updates if user is the collaborator or a gestor/analista viewing their team
                if (currentUser.perfil === 'colaborador' || currentUser.perfil === 'gestor' || currentUser.perfil === 'analista' || currentUser.perfil === 'admin') {
                    html += '<h4 style="margin-top: 20px; margin-bottom: 10px;">Atualizações de Progresso</h4>';

                    if (pdi.atualizacoes && pdi.atualizacoes.length > 0) {
                        pdi.atualizacoes.forEach(update => {
                            html += '<div class="update-item">';
                            html += '<strong>' + update.autor + '</strong> - ' + (update.data ? formatDate(update.data) : '') + '<br>';
                            html += update.texto;
                            html += '</div>';
                        });
                    } else {
                        html += '<p style="color: #636E72;">Nenhuma atualização ainda.</p>';
                    }

                    // Allow adding updates if user is the collaborator
                    if (currentUser.id === pdi.colaborador_id || currentUser.perfil === 'admin') {
                        html += '<div class="pdi-form-section" style="margin-top: 20px;">';
                        html += '<label>Adicionar Atualização:</label>';
                        html += '<textarea id="novaAtualizacao" placeholder="Descreva o progresso..." style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; min-height: 80px;"></textarea>';
                        html += '<button class="btn btn-primary" onclick="addAtualizacaoPDI(\'' + pdiId + '\')" style="margin-top: 10px; width: auto; padding: 8px 16px;">Adicionar Atualização</button>';
                        html += '</div>';
                    }
                }

                openModal('Visualizar PDI: ' + pdi.titulo, html, [
                    { text: 'Fechar', onclick: 'closeModal()', class: 'btn-secondary' },
                    { text: 'Editar', onclick: 'editPDI("' + pdiId + '")', class: 'btn-primary' }
                ]);
            } catch (error) {
                console.error('Erro ao visualizar PDI:', error);
                showToast('error', 'Erro', error.message);
            }
        }

        async function addAtualizacaoPDI(pdiId) {
            const texto = document.getElementById('novaAtualizacao').value;

            if (!texto.trim()) {
                showToast('warn', 'Atenção', 'Digite uma atualização antes de salvar.');
                return;
            }

            try {
                const doc = await db.collection('pdis').doc(pdiId).get();
                const pdi = doc.data();
                const atualizacoes = pdi.atualizacoes || [];

                atualizacoes.push({
                    autor: currentUser.nome,
                    texto: texto,
                    data: new Date()
                });

                await db.collection('pdis').doc(pdiId).update({
                    atualizacoes: atualizacoes
                });
                invalidateCache('pdis:');

                showToast('success', 'Adicionada!', 'Atualização registrada com sucesso.');
                closeModal();
                viewPDI(pdiId);
            } catch (error) {
                console.error('Erro ao adicionar atualização:', error);
                showToast('error', 'Erro', error.message);
            }
        }

        async function editPDI(pdiId) {
            try {
                const docSnap = await db.collection('pdis').doc(pdiId).get();
                const pdi = docSnap.data();

                // Permissão: admin, gestor do colaborador, ou o próprio colaborador
                const canEdit = currentUser.perfil === 'admin' ||
                    currentUser.id === pdi.colaborador_id ||
                    currentUser.id === pdi.criador_id ||
                    currentUser.perfil === 'gestor' || currentUser.perfil === 'analista';

                if (!canEdit) {
                    showToast('error', 'Sem permissão', 'Você não tem permissão para editar este PDI.');
                    return;
                }

                const html = `
                    <div class="pdi-form-section">
                        <label>Título:</label>
                        <input type="text" id="editPdiTitulo" value="${pdi.titulo}">
                    </div>
                    <div class="pdi-form-section">
                        <label>Descrição:</label>
                        <textarea id="editPdiDescricao">${pdi.descricao || ''}</textarea>
                    </div>
                    <div class="pdi-form-section">
                        <label>Status:</label>
                        <select id="editPdiStatus">
                            <option value="pendente" ${pdi.status === 'pendente' ? 'selected' : ''}>Pendente</option>
                            <option value="em_andamento" ${pdi.status === 'em_andamento' ? 'selected' : ''}>Em Andamento</option>
                            <option value="concluido" ${pdi.status === 'concluido' ? 'selected' : ''}>Concluído</option>
                        </select>
                    </div>
                `;
                closeModal();
                openModal('Editar PDI', html, [
                    { text: 'Cancelar', onclick: 'closeModal()', class: 'btn-secondary' },
                    { text: 'Salvar', onclick: 'saveEditPDI("' + pdiId + '")', class: 'btn-primary' }
                ]);
            } catch(error) {
                console.error('Erro ao abrir edição PDI:', error);
                showToast('error', 'Erro', error.message);
            }
        }

        async function saveEditPDI(pdiId) {
            const titulo = document.getElementById('editPdiTitulo').value;
            const descricao = document.getElementById('editPdiDescricao').value;
            const status = document.getElementById('editPdiStatus').value;

            if (!titulo) { showToast('warn', 'Atenção', 'Título é obrigatório.'); return; }

            try {
                await db.collection('pdis').doc(pdiId).update({
                    titulo: titulo,
                    descricao: descricao,
                    status: status
                });
                invalidateCache('pdis:');
                showToast('success', 'PDI atualizado!', 'Alterações salvas com sucesso.');
                closeModal();
                loadPDI();
            } catch(error) {
                console.error('Erro ao salvar PDI:', error);
                showToast('error', 'Erro ao salvar', error.message);
            }
        }

        async function deletePDI(pdiId) {
            showConfirm('⚠️', 'Deletar PDI', 'Tem certeza que deseja deletar este plano de desenvolvimento? Esta ação é irreversível.', 'Deletar', async function() {
                try {
                    await db.collection('pdis').doc(pdiId).delete();
                    invalidateCache('pdis:');
                    showToast('success', 'PDI deletado', 'Plano removido com sucesso.');
                    loadPDI();
                } catch (error) {
                    console.error('Erro ao deletar PDI:', error);
                    showToast('error', 'Erro ao deletar', error.message);
                }
            });
        }

        function closePDIForm() {
            closeModal();
        }

        function openModal(title, body, buttons) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = body;

            const buttonsContainer = document.getElementById('modalButtons');
            buttonsContainer.innerHTML = '';

            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.className = 'btn ' + btn.class;
                button.textContent = btn.text;
                button.onclick = () => {
                    eval(btn.onclick);
                };
                buttonsContainer.appendChild(button);
            });

            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
    </script>
</body>
</html>
