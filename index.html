<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zukkin RH</title>
    <!-- Pré-aquece DNS + TCP + TLS com Firestore antes do Firebase SDK terminar de carregar. -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
    <link rel="dns-prefetch" href="https://firestore.googleapis.com">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script async src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script async src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --primary: #D42027;
            --primary-light: #E85B5B;
            --primary-dark: #B01A20;
            --secondary: #333333;
            --danger: #D63031;
            --warning: #FDCB6E;
            --info: #0984E3;
            --light: #F8F8F8;
            --dark: #2D2D2D;
            --border: #E0E0E0;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: var(--dark);
            min-height: 100vh;
        }

        /* Login Styles */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
                        url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .login-box {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-box h1 {
            color: var(--primary);
            margin-bottom: 10px;
            text-align: center;
        }

        .login-box p {
            color: #636E72;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(212, 32, 39, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: #00A087;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #BE2C15;
        }

        .btn-small {
            padding: 6px 14px;
            font-size: 12px;
            width: auto;
            display: inline-block;
            min-width: 0;
        }

        .forgot-password-link {
            display: block;
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
        }

        .forgot-password-link a {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .forgot-password-link a:hover {
            text-decoration: underline;
        }

        /* Main App Styles */
        .app-container {
            display: flex;
            min-height: 100vh;
            background: var(--light);
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .sidebar-header h2 {
            font-size: 18px;
            color: var(--primary);
        }

        .user-info {
            margin-bottom: 30px;
            padding: 15px;
            background: var(--light);
            border-radius: 8px;
            font-size: 13px;
        }

        .user-info p {
            margin: 5px 0;
            color: #636E72;
        }

        .user-info strong {
            color: var(--dark);
        }

        .nav-menu {
            list-style: none;
            flex: 1;
        }

        .nav-menu li {
            margin-bottom: 8px;
        }

        .nav-menu a {
            display: block;
            padding: 12px 16px;
            border-radius: 6px;
            color: #636E72;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .nav-menu a:hover {
            background: var(--light);
            color: var(--primary);
        }

        .nav-menu a.active {
            background: var(--primary);
            color: white;
            font-weight: 600;
        }

        .logout-btn {
            width: 100%;
            margin-top: auto;
            padding: 10px;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .content-header {
            margin-bottom: 30px;
        }

        .content-header h1 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            gap: 20px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: none;
            border-bottom: 3px solid transparent;
            color: #636E72;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-primary {
            background: rgba(212, 32, 39, 0.2);
            color: var(--primary);
        }

        .badge-secondary {
            background: rgba(51, 51, 51, 0.1);
            color: var(--secondary);
        }

        .badge-danger {
            background: rgba(214, 48, 49, 0.2);
            color: var(--danger);
        }

        .badge-warning {
            background: rgba(253, 203, 110, 0.2);
            color: #D68910;
        }

        .badge-pendente {
            background: rgba(253, 203, 110, 0.2);
            color: #D68910;
        }

        .badge-em_andamento {
            background: rgba(9, 132, 227, 0.2);
            color: var(--info);
        }

        .badge-concluido {
            background: rgba(0, 184, 148, 0.2);
            color: #00B894;
        }

        .badge-cancelado {
            background: rgba(214, 48, 49, 0.2);
            color: var(--danger);
        }

        .pdi-form {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .pdi-form-section {
            margin-bottom: 20px;
        }

        .pdi-form-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .pdi-form-section input,
        .pdi-form-section textarea,
        .pdi-form-section select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .pdi-form-section textarea {
            resize: vertical;
            min-height: 80px;
        }

        .pdi-form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .pdi-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .pdi-table th {
            background: var(--light);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--dark);
            font-size: 13px;
            border-bottom: 2px solid var(--border);
        }

        .pdi-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .pdi-table tr:hover {
            background: var(--light);
        }

        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        .table th {
            background: var(--light);
            padding: 10px 8px;
            text-align: left;
            font-weight: 600;
            color: var(--dark);
            font-size: 13px;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }

        .table td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .table tr:hover {
            background: var(--light);
        }

        .table .actions-cell {
            white-space: nowrap;
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: flex-start;
        }

        .table .actions-cell .btn,
        .table .actions-cell .btn-small {
            width: auto;
            flex: 0 0 auto;
        }

        .scale-buttons {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .scale-btn {
            width: 45px;
            height: 45px;
            border: 2px solid var(--border);
            border-radius: 6px;
            background: white;
            color: var(--dark);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .scale-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .scale-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .nps-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .nps-btn {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .nps-btn:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .nps-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .textárea-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
        }

        .textárea-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(212, 32, 39, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: 400;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-item input[type="radio"] {
            cursor: pointer;
        }

        .radio-item label {
            margin: 0;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            color: var(--primary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #636E72;
        }

        .close-btn:hover {
            color: var(--dark);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #636E72;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 16px;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: rgba(0, 184, 148, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(0, 184, 148, 0.3);
        }

        .alert-error {
            background: rgba(214, 48, 49, 0.1);
            color: var(--danger);
            border: 1px solid rgba(214, 48, 49, 0.3);
        }

        .alert-info {
            background: rgba(9, 132, 227, 0.1);
            color: var(--info);
            border: 1px solid rgba(9, 132, 227, 0.3);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .collaborator-select {
            margin-bottom: 20px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .collaborator-select label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .collaborator-select select {
            width: 100%;
            max-width: 300px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
        }

        .sidebar-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .sidebar-toggle:hover {
            background: var(--light);
        }

        .sidebar.collapsed {
            width: 60px;
            padding: 20px 10px;
        }

        .sidebar.collapsed .sidebar-header h2,
        .sidebar.collapsed .user-info,
        .sidebar.collapsed .nav-menu a span,
        .sidebar.collapsed .logout-btn span {
            display: none;
        }

        .sidebar.collapsed .nav-menu a {
            text-align: center;
            padding: 12px 8px;
            font-size: 18px;
        }

        .sidebar.collapsed .sidebar-header {
            justify-content: center;
        }

        .progress-bar {
            height: 8px;
            background: #E0E0E0;
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-0 {
            background: var(--warning);
        }

        .progress-50 {
            background: var(--info);
        }

        .progress-100 {
            background: #00B894;
        }

        .update-item {
            border-left: 3px solid var(--primary);
            padding-left: 12px;
            margin: 10px 0;
            padding: 10px 0 10px 12px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-card h3 {
            color: var(--primary);
            font-size: 28px;
            margin: 10px 0;
        }

        .stat-card p {
            color: #636E72;
            font-size: 14px;
        }

        .form-section {
            margin-bottom: 25px;
        }

        .form-section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .question-group {
            margin-bottom: 20px;
        }

        .question-label {
            display: block;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--dark);
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 15px;
            }

            .sidebar.collapsed {
                width: 0;
                padding: 0;
                overflow: hidden;
            }

            .user-info {
                display: none;
            }

            .nav-menu {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }

            .nav-menu li {
                margin: 0;
            }

            .main-content {
                padding: 20px;
            }

            .tabs {
                gap: 10px;
            }

            .tab-btn {
                padding: 10px 15px;
                font-size: 12px;
            }
        }

        /* ===== Toast Notifications ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            min-width: 320px;
            max-width: 440px;
            padding: 14px 20px 14px 16px;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            line-height: 1.4;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,.18);
            animation: toastIn .35s ease-out;
            position: relative;
        }
        .toast.toast-out { animation: toastOut .3s ease-in forwards; }
        .toast-success { background: linear-gradient(135deg, #2e7d32, #43a047); }
        .toast-error   { background: linear-gradient(135deg, #c62828, #e53935); }
        .toast-info    { background: linear-gradient(135deg, #1565c0, #1e88e5); }
        .toast-warn    { background: linear-gradient(135deg, #e65100, #fb8c00); }
        .toast-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
        .toast-body { flex: 1; }
        .toast-title { font-weight: 700; margin-bottom: 2px; }
        .toast-msg { opacity: .92; font-size: 13px; }
        .toast-close {
            position: absolute; top: 8px; right: 10px;
            background: none; border: none; color: rgba(255,255,255,.7);
            font-size: 18px; cursor: pointer; padding: 0; line-height: 1;
        }
        .toast-close:hover { color: #fff; }
        @keyframes toastIn { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }
        @keyframes toastOut { to { opacity:0; transform:translateX(60px); } }

        /* ===== Tela de Redefinição de Senha ===== */
        .reset-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
                        url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .reset-card {
            background: #fff; border-radius: 16px; padding: 40px;
            box-shadow: 0 12px 40px rgba(0,0,0,.12);
            max-width: 440px; width: 92%;
        }

        // ============================================================
        // FIRESTORE LAZY INIT — o SDK é pesado e bloqueia a thread.
        // Inicializamos SOMENTE quando a primeira query for necessária.
        // A tela de login aparece instantaneamente, sem depender do SDK.
        // ============================================================
        let _db = null;
        let _dbReady = null;

        function getDb() {
            if (_db) return Promise.resolve(_db);
            if (_dbReady) return _dbReady;
            _dbReady = new Promise((resolve) => {
                function tryInit() {
                    if (typeof firebase !== 'undefined' && firebase.firestore) {
                        try {
                            firebase.initializeApp(firebaseConfig);
                        } catch(_) {} // already initialized
                        _db = firebase.firestore();
                        resolve(_db);
                    } else {
                        setTimeout(tryInit, 100);
                    }
                }
                tryInit();
            });
            return _dbReady;
        }

        // Compat: `db.collection(...)` funciona mesmo antes do SDK carregar.
        // TUDO é async — NUNCA bloqueia a thread.
        const db = {
            collection: function(name) {
                return {
                    get: () => getDb().then(d => d.collection(name).get()),
                    add: (data) => getDb().then(d => d.collection(name).add(data)),
                    where: function() {
                        const a = Array.from(arguments);
                        return {
                            get: () => getDb().then(d => d.collection(name).where(...a).get()),
                            where: function() {
                                const b = Array.from(arguments);
                                return {
                                    get: () => getDb().then(d => d.collection(name).where(...a).where(...b).get())
                                };
                            }
                        };
                    },
                    orderBy: function() {
                        const a = Array.from(arguments);
                        return {
                            limit: function(n) {
                                return {
                                    get: () => getDb().then(d => d.collection(name).orderBy(...a).limit(n).get())
                                };
                            },
                            get: () => getDb().then(d => d.collection(name).orderBy(...a).get())
                        };
                    },
                    doc: function(id) {
                        return {
                            get: () => getDb().then(d => d.collection(name).doc(id).get()),
                            update: (data) => getDb().then(d => d.collection(name).doc(id).update(data)),
                            delete: () => getDb().then(d => d.collection(name).doc(id).delete()),
                            ref: { update: (data) => getDb().then(d => d.collection(name).doc(id).update(data)) }
                        };
                    }
                };
            },
            settings: function() {}
        };

        // Helper: query com timeout (evita travar se Firestore não responder)
        function withTimeout(promise, ms) {
            return Promise.race([
                promise,
                new Promise((_, reject) => setTimeout(() => reject(new Error('TIMEOUT')), ms))
            ]);
        }

        // --- localStorage cache helpers ---
        function lsGet(key) {
            try {
                const raw = localStorage.getItem('zrh_' + key);
                if (!raw) return null;
                return JSON.parse(raw);
            } catch(_) { return null; }
        }
        function lsSet(key, docs) {
            try {
                localStorage.setItem('zrh_' + key, JSON.stringify(docs));
            } catch(_) {}
        }
        function lsClear(prefix) {
            try {
                const keys = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    if (k && k.startsWith('zrh_' + (prefix || ''))) keys.push(k);
                }
                keys.forEach(k => localStorage.removeItem(k));
            } catch(_) {}
        }

        // Converte snapshot do Firestore em array serializável
        function snapToArray(snap) {
            const arr = [];
            snap.forEach(doc => {
                const d = doc.data();
                // Converte Timestamps para ISO string
                for (const k in d) {
                    if (d[k] && typeof d[k].toDate === 'function') {
                        d[k] = d[k].toDate().toISOString();
                    }
                }
                arr.push({ id: doc.id, ...d });
            });
            return arr;
        }

        // Cria um "fake snapshot" a partir do array do localStorage
        // compatível com o padrão snap.forEach(doc => { doc.id, doc.data() })
        function arrayToFakeSnap(arr) {
            if (!arr) return null;
            return {
                empty: arr.length === 0,
                size: arr.length,
                docs: arr.map(item => ({
                    id: item.id,
                    data: () => {
                        const copy = { ...item };
                        delete copy.id;
                        return copy;
                    }
                })),
                forEach: function(fn) { this.docs.forEach(fn); }
            };
        }

        // --- Cache em memória (sessão atual) ---
        const _cache = new Map();
        function invalidateCache(prefix) {
            if (!prefix) { _cache.clear(); lsClear(''); return; }
            for (const k of Array.from(_cache.keys())) if (k.startsWith(prefix)) _cache.delete(k);
            lsClear(prefix);
        }

        // CORE: busca com stale-while-revalidate
        // 1. Retorna localStorage imediatamente se tiver dados
        // 2. Dispara Firestore em background
        // 3. Quando Firestore responder, salva em localStorage e memória
        async function cachedGet(key, fetcher) {
            // 1. Check memória (mais rápido)
            const memHit = _cache.get(key);
            if (memHit) return memHit;

            // 2. Check localStorage (instantâneo, sobrevive refresh)
            const lsData = lsGet(key);
            const fakeSnap = arrayToFakeSnap(lsData);

            // 3. Dispara Firestore com timeout de 8s
            const firestorePromise = Promise.race([
                fetcher().then(snap => {
                    // Salva no localStorage e memória para próxima vez
                    lsSet(key, snapToArray(snap));
                    _cache.set(key, snap);
                    return snap;
                }),
                new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('timeout')), 8000)
                )
            ]).catch(err => {
                console.warn('Firestore lento/offline para', key, err.message || err);
                return null;
            });

            // 4. Se temos dados no localStorage, retorna imediatamente
            if (fakeSnap) {
                _cache.set(key, fakeSnap);
                // Background: atualiza quando Firestore responder
                firestorePromise.then(snap => {
                    if (snap) _cache.set(key, snap);
                });
                return fakeSnap;
            }

            // 5. Sem cache: espera Firestore (primeira vez)
            const result = await firestorePromise;
            if (result) {
                _cache.set(key, result);
                return result;
            }

        // mesmo se o Firestore estiver vazio, com regras restritivas, ou

        const FALLBACK_ADMIN_EMAIL = 'admin@empresa.com';
        const FALLBACK_ADMIN_PASSWORD = 'admin123';

        function normalizeEmail(e) {
            return (e || '').trim().toLowerCase();
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = normalizeEmail(document.getElementById('loginEmail').value);
            const password = document.getElementById('loginPassword').value;

            // 1) Tentativa normal via Firestore (com timeout de 6s)
            try {
                const users = await withTimeout(
                    db.collection('usuarios').where('email', '==', email).get(), 6000
                );

                if (!users.empty) {
                    const user = users.docs[0];
                    const userData = user.data();
                    const hashedPassword = hashSenha(password);

                    if (userData.senha === hashedPassword) {
                        currentUser = { id: user.id, ...userData };
                        lsSet('session', currentUser);
                        // Verifica senha provisória
                        if (userData.provisoria) {
                            showChangePasswordScreen(user.id);
                            return;
                        }
                        showAppScreen();
                        return;
                    }

                    // Permite fallback do admin mesmo se o doc tem hash diferente
                    if (email === FALLBACK_ADMIN_EMAIL && password === FALLBACK_ADMIN_PASSWORD) {
                        // Restaura a senha padrão no doc existente
                        try { await user.ref.update({ senha: hashSenha(FALLBACK_ADMIN_PASSWORD), ativo: true }); } catch (_) {}
                        currentUser = { id: user.id, ...userData, perfil: 'admin', ativo: true };
                        lsSet('session', currentUser);
                        showAppScreen();
                        return;
                    }

                    showToast('error', 'Senha incorreta', 'Verifique sua senha e tente novamente.');
                    return;
                }
            } catch (error) {
                console.error('Erro ao consultar usuário:', error);
                // Timeout ou erro de rede — cai no fallback admin se for o admin
                if (!(email === FALLBACK_ADMIN_EMAIL && password === FALLBACK_ADMIN_PASSWORD)) {
                    showToast('error', 'Erro no login',
                        error.message === 'TIMEOUT'
                        ? 'Servidor demorou para responder. Tente novamente.'
                        : error.message);
                    return;
                }
            }

            // 2) FALLBACK: admin de emergência
            if (email === FALLBACK_ADMIN_EMAIL && password === FALLBACK_ADMIN_PASSWORD) {
                let adminId = 'admin-fallback';
                try {
                    const ref = await db.collection('usuarios').add({
                        nome: 'Administrador',
                        email: FALLBACK_ADMIN_EMAIL,
                        senha: hashSenha(FALLBACK_ADMIN_PASSWORD),
                        perfil: 'admin',
                        ativo: true,
                        data_criacao: new Date()
                    });
                    adminId = ref.id;
                    invalidateCache('usuarios:');
                } catch (e) {
                    console.warn('Não foi possível recriar admin no Firestore, seguindo em modo emergência:', e);
                }
                currentUser = {
                    id: adminId,
                    nome: 'Administrador',
                    email: FALLBACK_ADMIN_EMAIL,
                    perfil: 'admin',
                    ativo: true
                };
                lsSet('session', currentUser);
                showAppScreen();
                return;
            }

            showToast('error', 'Não encontrado', 'Usuário não encontrado. Verifique o email digitado.');
        }

        // Converte qualquer valor de data (Firestore Timestamp, string ISO, Date, {seconds}) para string pt-BR
        function formatDate(val) {
            if (!val) return 'N/A';
            try {
                // Firestore Timestamp com .toDate()
                if (typeof val.toDate === 'function') return val.toDate().toLocaleDateString('pt-BR');
                // Objeto com seconds (Timestamp serializado no cache)
                if (val.seconds) return new Date(val.seconds * 1000).toLocaleDateString('pt-BR');
                // String ISO ou Date
                const d = new Date(val);
                if (isNaN(d.getTime())) return 'N/A';
                return d.toLocaleDateString('pt-BR');
            } catch(_) { return 'N/A'; }
        }

        // Converte qualquer valor de data para Date object (para ordenação)
        function toDate(val) {
            if (!val) return new Date(0);
            try {
                if (typeof val.toDate === 'function') return val.toDate();
                if (val.seconds) return new Date(val.seconds * 1000);
                const d = new Date(val);
                return isNaN(d.getTime()) ? new Date(0) : d;
            } catch(_) { return new Date(0); }
        }

        function hashSenha(senha) {
            return CryptoJS.SHA256(senha).toString();
        }

        async function enviarEmailSenha() {
            const email = document.getElementById('forgotEmail').value;
            try {

                if (users.empty) {

                const userData = users.docs[0].data();
                const newPassword = generatePassword();
                await withTimeout(users.docs[0].ref.update({
                    senha: hashSenha(newPassword),
                    provisoria: true
                }), 6000);
                invalidateCache('usuarios:');

                try {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                        to_email: email,
                        to_name: userData.nome || email,
                        subject: 'Zukkin RH - Recuperação de Senha',
                        nova_senha: newPassword
                    });
                    showToast('success', 'Email enviado!', 'Nova senha enviada para ' + email + '. Verifique sua caixa de entrada.');
                } catch(emailErr) {
                    console.warn('Erro ao enviar email:', emailErr);
                    showToast('warn', 'Senha redefinida', 'Nova senha provisória: ' + newPassword + ' (não foi possível enviar por email)');

        async function saveNewPassword(userId) {
            var newPass = document.getElementById('newPass').value;
            var confirmPass = document.getElementById('confirmPass').value;

            if (newPass.length < 6) {
                showToast('error', 'Senha inválida', 'A senha deve ter no mínimo 6 caracteres.');
                return;
            }
            if (newPass !== confirmPass) {
                showToast('error', 'Senhas diferentes', 'As senhas digitadas não coincidem.');
                return;
            }

            var btn = document.getElementById('btnSaveNewPass');
            if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }

            try {
                await db.collection('usuarios').doc(userId).update({
                    senha: hashSenha(newPass),
                    provisoria: false
                });
                invalidateCache('usuarios:');
                currentUser.provisoria = false;
                lsSet('session', currentUser);

                var overlay = document.getElementById('changePassOverlay');
                if (overlay) overlay.remove();

                showToast('success', 'Senha atualizada!', 'Sua nova senha foi salva com sucesso.');
                showAppScreen();
            } catch (error) {
                console.error('Erro ao atualizar senha:', error);
                showToast('error', 'Erro ao salvar', error.message);
                if (btn) { btn.disabled = false; btn.textContent = 'Salvar Nova Senha'; }

        function buildNavigation() {
            const navMenu = document.getElementById('navMenu');

            const tabs = TABS[currentUser.perfil] || [];
            tabs.forEach((tab, index) => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                const icon = navIcons[tab.key] || '•';
                const span = document.createElement('span');
                span.textContent = tab.label;
                a.appendChild(document.createTextNode(icon + ' '));
                a.appendChild(span);
                a.onclick = () => switchTab(tab.id, a);
                if (index === 0) a.classList.add('active');
                li.appendChild(a);
                navMenu.appendChild(li);
            });

            switchTab(tabs[0].id, navMenu.querySelector('a'));
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-menu a').forEach(link => link.classList.remove('active'));

            const tabElement = document.getElementById(tabId);
            if (tabElement) {
                tabElement.classList.add('active');

                if (tabId === 'questionnairesTab') loadQuestionnaires();
                else if (tabId === 'evaluationsTab') loadEvaluations();
                else if (tabId === 'subordinatesTab') loadSubordinates();
                else if (tabId === 'dashboardTab') loadDashboard();

                else if (tabId === 'pesquisasColabTab') loadPesquisasColabTab();
                else if (tabId === 'pdiTab') loadPDI();
            }

        async function loadQuestionnaires() {
            const container = document.getElementById('questionnairesContainer');

                const liberacoes = await cachedGet('liberacoes:user:' + currentUser.id, () =>
                    db.collection('liberacoes').where('colaborador_id', '==', currentUser.id).get());

                const liberadosTipos = {};
                liberacoes.forEach(doc => {
                    liberadosTipos[doc.data().tipo_pesquisa] = true;
                });

                if (Object.keys(liberadosTipos).length === 0) {
                    container.innerHTML = '<div class="alert alert-info">Nenhum questionário disponível no momento.</div>';
                    return;
                }

                let html = '';
                const tiposOrdenados = ['experiencia_45_colab', 'desempenho_90_colab'];

                for (const tipo of tiposOrdenados) {
                    if (liberadosTipos[tipo]) {
                        const template = SURVEY_TEMPLATES[tipo];

        function renderQuestion(question, surveyType) {
            const questionId = surveyType + '_' + question.id;

            if (question.tipo === 'escala') {
                let html = '<div class="question-group">';
                html += '<label class="question-label">' + question.texto + '</label>';
                html += '<div class="scale-buttons">';
                for (let n = 1; n <= 5; n++) {
                    html += '<button type="button" class="scale-btn" onclick="selectScale(\'' + questionId + '\', ' + n + ')">' + n + '</button>';
                }
                html += '</div>';
                html += '<input type="hidden" id="' + questionId + '" value="">';
                html += '</div>';
                return html;
            } else if (question.tipo === 'sim_nao') {
                let html = '<div class="question-group">';
                html += '<label class="question-label">' + question.texto + '</label>';
                html += '<div class="radio-group">';
                html += '<div class="radio-item">';
                html += '<input type="radio" id="' + questionId + '_yes" name="' + questionId + '" value="sim" onchange="selectOption(\'' + questionId + '\', \'sim\')">';
                html += '<label for="' + questionId + '_yes">Sim</label>';
                html += '</div>';
                html += '<div class="radio-item">';
                html += '<input type="radio" id="' + questionId + '_no" name="' + questionId + '" value="nao" onchange="selectOption(\'' + questionId + '\', \'nao\')">';
                html += '<label for="' + questionId + '_no">Não</label>';
                html += '</div>';
                html += '</div>';
                html += '<input type="hidden" id="' + questionId + '" value="">';
                html += '</div>';
                return html;
            } else if (question.tipo === 'nps') {
                let html = '<div class="question-group">';
                html += '<label class="question-label">' + question.texto + '</label>';
                html += '<div class="nps-buttons">';
                for (let i = 0; i <= 10; i++) {
                    html += '<button type="button" class="nps-btn" onclick="selectNps(\'' + questionId + '\', ' + i + ')">' + i + '</button>';
                }
                html += '</div>';
                html += '<input type="hidden" id="' + questionId + '" value="">';
                html += '</div>';
                return html;
            } else if (question.tipo === 'texto') {
                let html = '<div class="question-group">';
                html += '<label class="question-label">' + question.texto + '</label>';
                html += '<textarea class="textárea-input" id="' + questionId + '" placeholder="Suas respostas aqui..."></textarea>';
                html += '</div>';
                return html;
            }

            return '';
        }

        function selectScale(questionId, value) {
            document.getElementById(questionId).value = value;
            const buttons = document.querySelectorAll('button[onclick*="' + questionId + '"]');
            buttons.forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function selectNps(questionId, value) {
            document.getElementById(questionId).value = value;
            const buttons = document.querySelectorAll('button[onclick*="' + questionId + '"]');
            buttons.forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
        }

            document.getElementById(questionId).value = value;

        async function saveSurvey(tipo) {
            const template = SURVEY_TEMPLATES[tipo];
            const respostas = {};

            template.secoes.forEach(secao => {
                secao.questoes.forEach(questao => {
                    const inputId = tipo + '_' + questao.id;
                    const input = document.getElementById(inputId);
                    if (input) {
                        respostas[questao.id] = input.value;
                    }
                });
            });

            try {
                await db.collection('respostas').add({
                    usuario_id: currentUser.id,
                    usuario_nome: currentUser.nome,
                    tipo_pesquisa: tipo,
                    respostas: respostas,
                    data_resposta: new Date(),
                    colaborador_id: currentUser.id
                });
                invalidateCache('respostas:');

                // Marcar liberação como respondida
                try {
                    const libs = await db.collection('liberacoes')
                        .where('colaborador_id', '==', currentUser.id)
                        .where('tipo_pesquisa', '==', tipo)
                        .get();
                    // Marca a mais recente não-respondida
                    let marcou = false;
                    const libsList = [];
                    libs.forEach(doc => libsList.push({ id: doc.id, ...doc.data() }));
                    libsList.sort((a, b) => {
                        const da = toDate(a.data_liberacao);
                        const db2 = toDate(b.data_liberacao);
                        return db2 - da;
                    });
                    for (const lib of libsList) {
                        if (!lib.respondida && !marcou) {
                            await db.collection('liberacoes').doc(lib.id).update({
                                respondida: true,
                                data_resposta: new Date()
                            });
                            marcou = true;
                        }
                    }
                    invalidateCache('liberacoes:');
                } catch(_) {}

                showToast('success', 'Salvo!', 'Questionário salvo com sucesso.');
                closeModal();
                loadQuestionnaires();
            } catch (error) {
                console.error('Erro ao salvar questionário:', error);
                showToast('error', 'Erro ao salvar', error.message);
            }
        }

        async function loadLiberacoes() {
            const container = document.getElementById('liberacoesContainer');
            container.innerHTML = '<div class="loading"></div>';

            try {
                const [usuarios, liberacoes, respostas] = await Promise.all([
                    cachedGet('usuarios:all', () => db.collection('usuarios').get()),
                    cachedGet('liberacoes:all', () => db.collection('liberacoes').get()),
                    cachedGet('respostas:all', () => db.collection('respostas').get())
                ]);

                // Mapear respostas por colaborador+tipo
                const respostasPorUserTipo = {};
                respostas.forEach(doc => {
                    const r = doc.data();
                    const chave = (r.colaborador_id || r.usuario_id) + '|' + r.tipo_pesquisa;
                    if (!respostasPorUserTipo[chave]) respostasPorUserTipo[chave] = [];
                    respostasPorUserTipo[chave].push({
                        data: formatDate(r.data_resposta)
                    });
                });

                // Agrupar liberações por usuário
                const liberacoesPorUsuario = {};
                liberacoes.forEach(doc => {
                    const data = doc.data();
                    if (!liberacoesPorUsuario[data.colaborador_id]) liberacoesPorUsuario[data.colaborador_id] = [];
                    liberacoesPorUsuario[data.colaborador_id].push({ id: doc.id, ...data });
                });

                // Ordenar liberações de cada usuário por data (mais recente primeiro)
                for (const uid in liberacoesPorUsuario) {
                    liberacoesPorUsuario[uid].sort((a, b) => {
                        const da = toDate(a.data_liberacao);
                        const db2 = toDate(b.data_liberacao);
                        return db2 - da;
                    });
                }

                let html = '';

                usuarios.forEach(doc => {
                    const u = doc.data();
                    const uid = doc.id;
                    const libs = liberacoesPorUsuario[uid] || [];
                    const totalEnviadas = libs.length;
                    let totalRespondidas = 0;
                    libs.forEach(l => {
                        if (l.respondida) totalRespondidas++;
                    });
                    const totalPendentes = totalEnviadas - totalRespondidas;

                    // Card por colaborador
                    html += '<div class="card" style="margin-bottom:12px;">';

                    // Header clicável
                    html += '<div class="card-header" style="cursor:pointer;" onclick="toggleLibPanel(\'' + uid + '\')">';
                    html += '<div style="display:flex;align-items:center;gap:12px;flex:1;flex-wrap:wrap;">';
                    html += '<strong style="font-size:15px;">' + u.nome + '</strong>';
                    html += '<span class="badge badge-primary">' + (u.perfil || 'sem perfil') + '</span>';
                    if (u.lider) html += '<span style="color:#636E72;font-size:13px;">Gestor: ' + u.lider + '</span>';
                    html += '</div>';
                    html += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
                    if (totalEnviadas > 0) {
                        html += '<span style="font-size:12px;background:#e8f5e9;color:#2e7d32;padding:3px 8px;border-radius:12px;">' + totalRespondidas + ' respondida' + (totalRespondidas !== 1 ? 's' : '') + '</span>';
                        if (totalPendentes > 0) html += '<span style="font-size:12px;background:#fff3e0;color:#e65100;padding:3px 8px;border-radius:12px;">' + totalPendentes + ' pendente' + (totalPendentes !== 1 ? 's' : '') + '</span>';
                    } else {
                        html += '<span style="font-size:12px;color:#636E72;">Nenhum envio</span>';
                    }
                    html += '<button class="btn btn-primary btn-small" onclick="event.stopPropagation();openLiberacaoForm(\'' + uid + '\', \'' + (u.nome || '').replace(/'/g, "\\'") + '\')">+ Enviar</button>';
                    html += '<span id="libArrow_' + uid + '" style="font-size:18px;transition:transform 0.2s;">▸</span>';
                    html += '</div>';
                    html += '</div>';

                    // Painel expansível (oculto por padrão)
                    html += '<div id="libPanel_' + uid + '" style="display:none;padding:0 15px 15px;">';

                    if (libs.length === 0) {
                        html += '<p style="color:#636E72;margin:10px 0;">Nenhuma pesquisa enviada para este colaborador.</p>';
                    } else {
                        html += '<table class="table" style="font-size:13px;margin-top:10px;">';
                        html += '<thead><tr><th>Pesquisa</th><th>Data Envio</th><th>Enviado Por</th><th>Status</th><th>Ações</th></tr></thead>';
                        html += '<tbody>';
                        libs.forEach(l => {
                            const nomeP = SURVEY_TEMPLATES[l.tipo_pesquisa] ? SURVEY_TEMPLATES[l.tipo_pesquisa].nome : l.tipo_pesquisa;
                            const dataLib = formatDate(l.data_liberacao);
                            const foiRespondida = l.respondida;
                            const statusHtml = foiRespondida
                                ? '<span style="color:#2e7d32;font-weight:600;">✅ Respondida' + (l.data_resposta ? ' em ' + formatDate(l.data_resposta) : '') + '</span>'
                                : '<span style="color:#e65100;font-weight:600;">⏳ Pendente</span>';
                            const enviadoPor = l.liberado_por_nome || l.liberado_por || 'N/A';

                            html += '<tr>';
                            html += '<td>' + nomeP + '</td>';
                            html += '<td>' + dataLib + '</td>';
                            html += '<td>' + enviadoPor + '</td>';
                            html += '<td>' + statusHtml + '</td>';
                            html += '<td><button class="btn btn-danger btn-small" onclick="excluirLiberacao(\'' + l.id + '\')">Excluir</button></td>';
                            html += '</tr>';
                        });
                        html += '</tbody></table>';
                    }

                    html += '</div>'; // fecha painel
                    html += '</div>'; // fecha card
                });

                container.innerHTML = html;
            } catch (error) {
                console.error('Erro ao carregar liberações:', error);
                container.innerHTML = '<div class="alert alert-error">Erro ao carregar liberações</div>';
            }
        }

        async function saveNewUsuario() {
            const nome = document.getElementById('newUserName').value;
            const email = document.getElementById('newUserEmail').value;
            const perfil = document.getElementById('newUserPerfil').value;
            const gestorSelect = document.getElementById('newUserGestor');
            const gestorId = gestorSelect.value || null;
            const gestorNome = gestorSelect.selectedOptions[0] ? gestorSelect.selectedOptions[0].getAttribute('data-nome') || null : null;
            const cargo = document.getElementById('newUserCargo') ? document.getElementById('newUserCargo').value || '' : '';
            const setor = document.getElementById('newUserSetor') ? document.getElementById('newUserSetor').value || '' : '';

            if (!nome || !email) {
                showToast('warn', 'Campos obrigatórios', 'Preencha nome e email para continuar.');
                return;
            }

            try {
                const password = generatePassword();
                await db.collection('usuarios').add({
                    nome: nome,
                    email: email,
                    senha: hashSenha(password),
                    perfil: perfil,
                    gestor_id: gestorId,
                    lider: gestorNome,
                    ativo: true,
                    provisoria: true,
                    data_criacao: new Date()
                });
                invalidateCache('usuarios:');

                try {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                        to_email: email,
                        to_name: nome,
                        subject: 'Zukkin RH - Sua conta foi criada',
                        nova_senha: password
                    });
                    showToast('success', 'Usuário criado!', 'Senha provisória enviada para ' + email);
                } catch(emailErr) {
                    console.warn('Erro ao enviar email:', emailErr);
                    showToast('warn', 'Usuário criado', 'Senha provisória: ' + password + ' (email não enviado)');
                }
                closeModal();
                loadUsuarios();
            } catch (error) {
                console.error('Erro ao criar usuário:', error);
                showToast('error', 'Erro ao criar', error.message);
            }
        }
