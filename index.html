<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zukkin RH</title>
    <!-- Pré-aquece DNS + TCP + TLS com Firestore antes do Firebase SDK terminar de carregar. -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
    <link rel="dns-prefetch" href="https://firestore.googleapis.com">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --primary: #D42027;
            --primary-light: #E85B5B;
            --primary-dark: #B01A20;
            --secondary: #333333;
            --danger: #D63031;
            --warning: #FDCB6E;
            --info: #0984E3;
            --light: #F8F8F8;
            --dark: #2D2D2D;
            --border: #E0E0E0;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--dark);
            min-height: 100vh;
        }

        /* Login Styles */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-box h1 {
            color: var(--primary);
            margin-bottom: 10px;
            text-align: center;
        }

        .login-box p {
            color: #636E72;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(212, 32, 39, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: #00A087;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #BE2C15;
        }

        .btn-small {
            padding: 6px 14px;
            font-size: 12px;
            width: auto;
            display: inline-block;
            min-width: 0;
        }

        .forgot-password-link {
            display: block;
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
        }

        .forgot-password-link a {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .forgot-password-link a:hover {
            text-decoration: underline;
        }

        /* Main App Styles */
        .app-container {
            display: flex;
            min-height: 100vh;
            background: var(--light);
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .sidebar-header h2 {
            font-size: 18px;
            color: var(--primary);
        }

        .user-info {
            margin-bottom: 30px;
            padding: 15px;
            background: var(--light);
            border-radius: 8px;
            font-size: 13px;
        }

        .user-info p {
            margin: 5px 0;
            color: #636E72;
        }

        .user-info strong {
            color: var(--dark);
        }

        .nav-menu {
            list-style: none;
            flex: 1;
        }

        .nav-menu li {
            margin-bottom: 8px;
        }

        .nav-menu a {
            display: block;
            padding: 12px 16px;
            border-radius: 6px;
            color: #636E72;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .nav-menu a:hover {
            background: var(--light);
            color: var(--primary);
        }

        .nav-menu a.active {
            background: var(--primary);
            color: white;
            font-weight: 600;
        }

        .logout-btn {
            width: 100%;
            margin-top: auto;
            padding: 10px;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .content-header {
            margin-bottom: 30px;
        }

        .content-header h1 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            gap: 20px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: none;
            border-bottom: 3px solid transparent;
            color: #636E72;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-primary {
            background: rgba(212, 32, 39, 0.2);
            color: var(--primary);
        }

        .badge-secondary {
            background: rgba(51, 51, 51, 0.1);
            color: var(--secondary);
        }

        .badge-danger {
            background: rgba(214, 48, 49, 0.2);
            color: var(--danger);
        }

        .badge-warning {
            background: rgba(253, 203, 110, 0.2);
            color: #D68910;
        }

        .badge-pendente {
            background: rgba(253, 203, 110, 0.2);
            color: #D68910;
        }

        .badge-em_andamento {
            background: rgba(9, 132, 227, 0.2);
            color: var(--info);
        }

        .badge-concluido {
            background: rgba(0, 184, 148, 0.2);
            color: #00B894;
        }

        .badge-cancelado {
            background: rgba(214, 48, 49, 0.2);
            color: var(--danger);
        }

        .pdi-form {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .pdi-form-section {
            margin-bottom: 20px;
        }

        .pdi-form-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .pdi-form-section input,
        .pdi-form-section textarea,
        .pdi-form-section select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .pdi-form-section textarea {
            resize: vertical;
            min-height: 80px;
        }

        .pdi-form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .pdi-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .pdi-table th {
            background: var(--light);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--dark);
            font-size: 13px;
            border-bottom: 2px solid var(--border);
        }

        .pdi-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .pdi-table tr:hover {
            background: var(--light);
        }

        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        .table th {
            background: var(--light);
            padding: 10px 8px;
            text-align: left;
            font-weight: 600;
            color: var(--dark);
            font-size: 13px;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }

        .table td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .table tr:hover {
            background: var(--light);
        }

        .table .actions-cell {
            white-space: nowrap;
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: flex-start;
        }

        .table .actions-cell .btn,
        .table .actions-cell .btn-small {
            width: auto;
            flex: 0 0 auto;
        }

        .scale-buttons {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .scale-btn {
            width: 45px;
            height: 45px;
            border: 2px solid var(--border);
            border-radius: 6px;
            background: white;
            color: var(--dark);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .scale-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .scale-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .nps-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .nps-btn {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .nps-btn:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .nps-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .textárea-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
        }

        .textárea-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(212, 32, 39, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: 400;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-item input[type="radio"] {
            cursor: pointer;
        }

        .radio-item label {
            margin: 0;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            color: var(--primary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #636E72;
        }

        .close-btn:hover {
            color: var(--dark);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #636E72;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 16px;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: rgba(0, 184, 148, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(0, 184, 148, 0.3);
        }

        .alert-error {
            background: rgba(214, 48, 49, 0.1);
            color: var(--danger);
            border: 1px solid rgba(214, 48, 49, 0.3);
        }

        .alert-info {
            background: rgba(9, 132, 227, 0.1);
            color: var(--info);
            border: 1px solid rgba(9, 132, 227, 0.3);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .collaborator-select {
            margin-bottom: 20px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .collaborator-select label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .collaborator-select select {
            width: 100%;
            max-width: 300px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
        }

        .sidebar-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .sidebar-toggle:hover {
            background: var(--light);
        }

        .sidebar.collapsed {
            width: 60px;
            padding: 20px 10px;
        }

        .sidebar.collapsed .sidebar-header h2,
        .sidebar.collapsed .user-info,
        .sidebar.collapsed .nav-menu a span,
        .sidebar.collapsed .logout-btn span {
            display: none;
        }

        .sidebar.collapsed .nav-menu a {
            text-align: center;
            padding: 12px 8px;
            font-size: 18px;
        }

        .sidebar.collapsed .sidebar-header {
            justify-content: center;
        }

        .progress-bar {
            height: 8px;
            background: #E0E0E0;
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-0 {
            background: var(--warning);
        }

        .progress-50 {
            background: var(--info);
        }

        .progress-100 {
            background: #00B894;
        }

        .update-item {
            border-left: 3px solid var(--primary);
            padding-left: 12px;
            margin: 10px 0;
            padding: 10px 0 10px 12px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-card h3 {
            color: var(--primary);
            font-size: 28px;
            margin: 10px 0;
        }

        .stat-card p {
            color: #636E72;
            font-size: 14px;
        }

        .form-section {
            margin-bottom: 25px;
        }

        .form-section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .question-group {
            margin-bottom: 20px;
        }

        .question-label {
            display: block;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--dark);
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 15px;
            }

            .sidebar.collapsed {
                width: 0;
                padding: 0;
                overflow: hidden;
            }

            .user-info {
                display: none;
            }

            .nav-menu {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }

            .nav-menu li {
                margin: 0;
            }

            .main-content {
                padding: 20px;
            }

            .tabs {
                gap: 10px;
            }

            .tab-btn {
                padding: 10px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h1>Zukkin RH</h1>
            <p>Sistema de Gestão e Desenvolvimento</p>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Senha</label>
                    <input type="password" id="loginPassword" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn btn-primary">Entrar</button>
                <div class="forgot-password-link">
                    <a onclick="showForgotPassword()">Esqueci minha senha</a>
                </div>
            </form>
        </div>
    </div>

    <div id="appScreen" class="app-container" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Menu</h2>
                <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            </div>
            <div class="user-info">
                <p><strong>Usuário:</strong> <span id="userNameDisplay"></span></p>
                <p id="userRoleDisplay"></p>
            </div>
            <ul class="nav-menu" id="navMenu"></ul>
            <button class="btn btn-danger logout-btn" onclick="handleLogout()"><span>Sair</span></button>
        </div>

        <div class="main-content">
            <div class="content-header">
                <h1>Zukkin RH</h1>
            </div>

            <!-- Dashboard Tab -->
            <div id="dashboardTab" class="tab-content active">
                <div class="grid" id="dashboardStats"></div>
                <div id="dashboardContent"></div>
            </div>

            <!-- Questionários Tab -->
            <div id="questionnairesTab" class="tab-content">
                <div id="questionnairesContainer"></div>
            </div>

            <!-- Avaliações Tab -->
            <div id="evaluationsTab" class="tab-content">
                <div class="collaborator-select">
                    <label for="collaboratorSelect">Selecione um colaborador:</label>
                    <select id="collaboratorSelect" onchange="loadEvaluationsForCollaborator()"></select>
                </div>
                <div id="evaluationsContainer"></div>
            </div>

            <!-- Subordinados Tab -->
            <div id="subordinatesTab" class="tab-content">
                <div id="subordinatesContainer"></div>
            </div>

            <!-- Respostas Tab -->
            <div id="respostasTab" class="tab-content">
                <div id="respostasContainer"></div>
            </div>

            <!-- Gestores Tab -->
            <div id="gestoresTab" class="tab-content">
                <div id="gestoresContainer"></div>
            </div>

            <!-- Pesquisas Colaborador Tab -->
            <div id="pesquisasColabTab" class="tab-content">
                <div id="pesquisasColabContainer"></div>
            </div>

            <!-- Liberar Pesquisas Tab -->
            <div id="liberacoesTab" class="tab-content">

        // Cache em memória por sessão (evita re-query ao alternar menus).
        // TTL padrão: 30s. Chamar invalidateCache() após mutações.
        const _cache = new Map();
        const CACHE_TTL_MS = 120000; // 2 minutos — dados mudam raramente
        function cacheGet(key) {
            const entry = _cache.get(key);
            if (!entry) return null;
            if (Date.now() - entry.t > CACHE_TTL_MS) { _cache.delete(key); return null; }
            return entry.v;
        }
        function cacheSet(key, v) { _cache.set(key, { t: Date.now(), v }); return v; }
        function invalidateCache(prefix) {
            if (!prefix) { _cache.clear(); return; }
            for (const k of Array.from(_cache.keys())) if (k.startsWith(prefix)) _cache.delete(k);
        }
        async function cachedGet(key, fetcher) {
            const hit = cacheGet(key);
            if (hit) return hit;
            return cacheSet(key, await fetcher());
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = normalizeEmail(document.getElementById('loginEmail').value);
            const password = document.getElementById('loginPassword').value;

            // 1) Tentativa normal via Firestore
            try {
                const users = await db.collection('usuarios').where('email', '==', email).get();

                if (!users.empty) {
                    const user = users.docs[0];
                    const userData = user.data();
                    const hashedPassword = hashSenha(password);

                    if (userData.senha === hashedPassword) {
                        currentUser = { id: user.id, ...userData };
                        showAppScreen();
                        return;
                    }

                    // Permite fallback do admin mesmo se o doc tem hash diferente
                    if (email === FALLBACK_ADMIN_EMAIL && password === FALLBACK_ADMIN_PASSWORD) {
                        // Restaura a senha padrão no doc existente
                        try { await user.ref.update({ senha: hashSenha(FALLBACK_ADMIN_PASSWORD), ativo: true }); } catch (_) {}
                        currentUser = { id: user.id, ...userData, perfil: 'admin', ativo: true };
                        showAppScreen();
                        return;
                    }

                    alert('Senha incorreta');
                    return;
                }
            } catch (error) {
                console.error('Erro ao consultar usuário:', error);
                // Não retorna ainda — deixa cair no fallback abaixo se for o admin
                if (!(email === FALLBACK_ADMIN_EMAIL && password === FALLBACK_ADMIN_PASSWORD)) {
                    alert('Erro ao fazer login: ' + error.message);
                    return;
                }
            }

            // 2) FALLBACK: admin de emergência
            if (email === FALLBACK_ADMIN_EMAIL && password === FALLBACK_ADMIN_PASSWORD) {
                let adminId = 'admin-fallback';
                try {
                    const ref = await db.collection('usuarios').add({
                        nome: 'Administrador',

                        senha: hashSenha(FALLBACK_ADMIN_PASSWORD),
                        perfil: 'admin',

                        data_criacao: new Date()
                    });
                    adminId = ref.id;
                    invalidateCache('usuarios:');
                } catch (e) {
                    console.warn('Não foi possível recriar admin no Firestore, seguindo em modo emergência:', e);
                }
                currentUser = {
                    id: adminId,
                    nome: 'Administrador',
                    email: FALLBACK_ADMIN_EMAIL,
                    perfil: 'admin',
                    ativo: true
                };
                showAppScreen();
                return;
            }

            alert('Usuário não encontrado');
        }

                html += '</div>';
                html += '<input type="hidden" id="' + questionId + '" value="">';
                html += '</div>';
                return html;
            } else if (question.tipo === 'sim_nao') {
                let html = '<div class="question-group">';
                html += '<label class="question-label">' + question.texto + '</label>';
                html += '<div class="radio-group">';
                html += '<div class="radio-item">';
                html += '<input type="radio" id="' + questionId + '_yes" name="' + questionId + '" value="sim" onchange="selectOption(\'' + questionId + '\', \'sim\')">';
                html += '<label for="' + questionId + '_yes">Sim</label>';
                html += '</div>';
                html += '<div class="radio-item">';
                html += '<input type="radio" id="' + questionId + '_no" name="' + questionId + '" value="nao" onchange="selectOption(\'' + questionId + '\', \'nao\')">';
                html += '<label for="' + questionId + '_no">Não</label>';
                html += '</div>';
                html += '</div>';
                html += '<input type="hidden" id="' + questionId + '" value="">';
                html += '</div>';
                return html;
            } else if (question.tipo === 'nps') {
                let html = '<div class="question-group">';
                html += '<label class="question-label">' + question.texto + '</label>';
                html += '<div class="nps-buttons">';
                for (let i = 0; i <= 10; i++) {
                    html += '<button type="button" class="nps-btn" onclick="selectNps(\'' + questionId + '\', ' + i + ')">' + i + '</button>';
                }
                html += '</div>';
                html += '<input type="hidden" id="' + questionId + '" value="">';
                html += '</div>';
                return html;
            } else if (question.tipo === 'texto') {
                let html = '<div class="question-group">';
                html += '<label class="question-label">' + question.texto + '</label>';
                html += '<textarea class="textárea-input" id="' + questionId + '" placeholder="Suas respostas aqui..."></textarea>';
                html += '</div>';
                return html;
            }

            return '';
        }

                html += '</div>';

                html += '<div class="stat-card">';

                html += '</div>';

                html += '<div class="stat-card">';

        async function saveLiberacaoMultipla(userId) {
            const todosTipos = ['experiencia_45_colab', 'desempenho_90_colab', 'experiencia_45_empresa', 'desempenho_90_empresa'];
            const marcados = [];
            if (document.getElementById('lib1').checked) marcados.push('experiencia_45_colab');
            if (document.getElementById('lib2').checked) marcados.push('desempenho_90_colab');
            if (document.getElementById('lib3').checked) marcados.push('experiencia_45_empresa');
            if (document.getElementById('lib4').checked) marcados.push('desempenho_90_empresa');

            try {
                for (const tipo of todosTipos) {
                    const existing = await db.collection('liberacoes')
                        .where('colaborador_id', '==', userId)
                        .where('tipo_pesquisa', '==', tipo)
                        .get();

                    if (marcados.includes(tipo)) {
                        // Adicionar se não existe
                        if (existing.empty) {
                            await db.collection('liberacoes').add({
                                colaborador_id: userId,
                                tipo_pesquisa: tipo,
                                liberado_por: currentUser.email,
                                data_liberacao: new Date()
                            });
                        }
                    } else {
                        // Remover se existe
                        existing.forEach(doc => {
                            db.collection('liberacoes').doc(doc.id).delete();
                        });
                    }
                }
                invalidateCache('liberacoes:');
                alert('Pesquisas atualizadas com sucesso!');
                closeModal();
                loadLiberacoes();
            } catch (error) {
                console.error('Erro ao liberar pesquisas:', error);
                alert('Erro ao liberar: ' + error.message);
            }
        }

                { text: 'Cancelar', onclick: 'closeModal()', class: 'btn-secondary' },
                { text: 'Salvar', onclick: 'saveNewUsuario()', class: 'btn-primary' }
            ]);
        }

        async function saveNewUsuario() {
            const nome = document.getElementById('newUserName').value;
            const email = document.getElementById('newUserEmail').value;
            const perfil = document.getElementById('newUserPerfil').value;
            const lider = document.getElementById('newUserLider').value || null;

            if (!nome || !email) {
                alert('Preencha todos os campos obrigatórios');
                return;
            }

            try {
                const password = generatePassword();
                await db.collection('usuarios').add({
                    nome: nome,
                    email: email,
                    senha: hashSenha(password),
                    perfil: perfil,
                    lider: lider,
                    ativo: true,
                    data_criacao: new Date()
                });
                invalidateCache('usuarios:');

                alert('Usuário criado com sucesso! Senha temporária: ' + password);
                closeModal();
                loadUsuarios();
            } catch (error) {
                console.error('Erro ao criar usuário:', error);
                alert('Erro ao criar usuário: ' + error.message);
            }
        }

        async function openEditUsuario(userId) {
            try {
                const doc = await db.collection('usuarios').doc(userId).get();
                const u = doc.data();

                const html = `
                    <div class="pdi-form-section">
                        <label>Nome:</label>
                        <input type="text" id="editUserName" value="${u.nome}">
                    </div>
                    <div class="pdi-form-section">
                        <label>Email:</label>
                        <input type="email" id="editUserEmail" value="${u.email}">
                    </div>
                    <div class="pdi-form-section">
                        <label>Perfil:</label>
                        <select id="editUserPerfil">
                            <option value="colaborador" ${u.perfil === 'colaborador' ? 'selected' : ''}>Colaborador</option>
                            <option value="gestor" ${u.perfil === 'gestor' ? 'selected' : ''}>Gestor</option>
                            <option value="analista" ${u.perfil === 'analista' ? 'selected' : ''}>Analista</option>
                            <option value="diretoria" ${u.perfil === 'diretoria' ? 'selected' : ''}>Diretoria</option>
                        </select>
                    </div>
                    <div class="pdi-form-section">
                        <label>Status:</label>
                        <select id="editUserStatus">
                            <option value="true" ${u.ativo ? 'selected' : ''}>Ativo</option>
                            <option value="false" ${!u.ativo ? 'selected' : ''}>Inativo</option>
                        </select>
                    </div>
                `;
                openModal('Editar Usuário', html, [
                    { text: 'Cancelar', onclick: 'closeModal()', class: 'btn-secondary' },
                    { text: 'Salvar', onclick: 'saveEditUsuario("' + userId + '")', class: 'btn-primary' }
                ]);
            } catch (error) {
                console.error('Erro ao abrir formulário de edição:', error);
                alert('Erro: ' + error.message);
            }
        }

        async function saveEditUsuario(userId) {
            const nome = document.getElementById('editUserName').value;
            const email = document.getElementById('editUserEmail').value;
            const perfil = document.getElementById('editUserPerfil').value;
            const ativo = document.getElementById('editUserStatus').value === 'true';

            try {
                await db.collection('usuarios').doc(userId).update({
                    nome: nome,
                    email: email,
                    perfil: perfil,
                    ativo: ativo
                });
                invalidateCache('usuarios:');

                alert('Usuário atualizado com sucesso!');
                closeModal();
                loadUsuarios();
            } catch (error) {
                console.error('Erro ao atualizar usuário:', error);
                alert('Erro ao atualizar: ' + error.message);
            }
        }

        async function deleteUsuario(userId) {
            if (!confirm('Tem certeza que deseja deletar este usuário?')) {
                return;
            }

            try {
                await db.collection('usuarios').doc(userId).delete();
                invalidateCache('usuarios:');
                alert('Usuário deletado com sucesso!');
                loadUsuarios();
            } catch (error) {
                console.error('Erro ao deletar usuário:', error);
                alert('Erro ao deletar: ' + error.message);
            }
        }

        async function toggleUsuario(userId, currentStatus) {
            try {
                await db.collection('usuarios').doc(userId).update({
                    ativo: !currentStatus
                });
                invalidateCache('usuarios:');
                loadUsuarios();
            } catch (error) {
                console.error('Erro ao alternar status do usuário:', error);
            }
        }

        async function loadPDI() {
            const container = document.getElementById('pdiContainer');
            container.innerHTML = '<div class="loading"></div>';

            try {
                if (currentUser.perfil === 'colaborador') {
                    await loadPDIColaborador();
                } else if (currentUser.perfil === 'gestor' || currentUser.perfil === 'analista') {
                    await loadPDIGestorAnalista();
                } else if (currentUser.perfil === 'admin' || currentUser.perfil === 'diretoria') {
                    await loadPDIAdmin();
                }
            } catch (error) {
                console.error('Erro ao carregar PDI:', error);
                container.innerHTML = '<div class="alert alert-error">Erro ao carregar PDI</div>';
            }
        }

        async function loadPDIColaborador() {
            const container = document.getElementById('pdiContainer');
            container.innerHTML = '<button class="btn btn-primary" onclick="openPDIForm()">+ Novo PDI</button><div id="pdiList"></div>';

            try {
                const pdis = await cachedGet('pdis:user:' + currentUser.id, () =>
                    db.collection('pdis').where('colaborador_id', '==', currentUser.id).get());

                const listContainer = document.getElementById('pdiList');
                let html = '';

                if (pdis.empty) {
                    html = '<div class="alert alert-info">Nenhum PDI encontrado.</div>';
                } else {
                    pdis.forEach(doc => {
                        const pdi = doc.data();
                        const progressValue = pdi.status === 'pendente' ? 0 : pdi.status === 'em_andamento' ? 50 : 100;
                        const progressClass = 'progress-' + progressValue;

                        html += '<div class="card">';
                        html += '<div class="card-header">';
                        html += '<div>';
                        html += '<div class="card-title">' + pdi.titulo + '</div>';
                        html += '<span class="badge badge-' + pdi.status + '">' + pdi.status + '</span>';
                        html += '</div>';
                        html += '<button class="btn btn-primary btn-small" onclick="viewPDI(\'' + doc.id + '\')">Visualizar</button>';
                        html += '</div>';
                        html += '<div class="progress-bar">';
                        html += '<div class="progress-bar-fill ' + progressClass + '" style="width: ' + progressValue + '%"></div>';
                        html += '</div>';
                        html += '<p style="margin-top: 10px; font-size: 12px; color: #636E72;">Progresso: ' + progressValue + '%</p>';
                        html += '</div>';
                    });
                }

                listContainer.innerHTML = html;
            } catch (error) {
                console.error('Erro ao carregar PDIs do colaborador:', error);
            }
        }

        async function loadPDIGestorAnalista() {
            const container = document.getElementById('pdiContainer');
            container.innerHTML = '<button class="btn btn-primary" onclick="openPDIForm()">+ Novo PDI</button>';

            try {
                const [myPdis, subordinados] = await Promise.all([
                    cachedGet('pdis:user:' + currentUser.id, () =>
                        db.collection('pdis').where('colaborador_id', '==', currentUser.id).get()),
                    cachedGet('usuarios:subordinados:' + currentUser.nome, () =>
                        db.collection('usuarios').where('lider', '==', currentUser.nome).get())
                ]);

                const subordinadoIds = [];
                subordinados.forEach(doc => {
                    subordinadoIds.push(doc.id);
                });

                let teamPdis = [];
                if (subordinadoIds.length > 0) {
                    const teamDocsSnap = await db.collection('pdis')
                        .where('colaborador_id', 'in', subordinadoIds)
                        .get();
                    teamDocsSnap.forEach(doc => {
                        teamPdis.push({ id: doc.id, ...doc.data() });
                    });
                }

                let html = '';

                // Meu PDI
                html += '<h3 style="margin-top: 20px; margin-bottom: 15px;">Meu PDI</h3>';
                if (myPdis.empty) {
                    html += '<div class="alert alert-info">Você ainda não tem um PDI.</div>';
                } else {
                    myPdis.forEach(doc => {
                        const pdi = doc.data();
                        const progressValue = pdi.status === 'pendente' ? 0 : pdi.status === 'em_andamento' ? 50 : 100;
                        const progressClass = 'progress-' + progressValue;

                        html += '<div class="card">';
                        html += '<div class="card-header">';
                        html += '<div>';
                        html += '<div class="card-title">' + pdi.titulo + '</div>';
                        html += '<span class="badge badge-' + pdi.status + '">' + pdi.status + '</span>';
                        html += '</div>';
                        html += '<button class="btn btn-primary btn-small" onclick="viewPDI(\'' + doc.id + '\')">Visualizar</button>';
                        html += '</div>';
                        html += '<div class="progress-bar">';
                        html += '<div class="progress-bar-fill ' + progressClass + '" style="width: ' + progressValue + '%"></div>';
                        html += '</div>';
                        html += '<p style="margin-top: 10px; font-size: 12px; color: #636E72;">Progresso: ' + progressValue + '%</p>';
                        html += '</div>';
                    });
                }

                // PDI da Equipe
                html += '<h3 style="margin-top: 30px; margin-bottom: 15px;">PDI da Minha Equipe</h3>';
                if (teamPdis.length === 0) {
                    html += '<div class="alert alert-info">Nenhum PDI encontrado para sua equipe.</div>';
                } else {
                    teamPdis.forEach(pdi => {
                        const progressValue = pdi.status === 'pendente' ? 0 : pdi.status === 'em_andamento' ? 50 : 100;
                        const progressClass = 'progress-' + progressValue;

                        html += '<div class="card">';
                        html += '<div class="card-header">';
                        html += '<div>';
                        html += '<div class="card-title">' + pdi.titulo + '</div>';
                        html += '<span class="badge badge-' + pdi.status + '">' + pdi.status + '</span>';
                        html += '</div>';
                        html += '<button class="btn btn-primary btn-small" onclick="viewPDI(\'' + pdi.id + '\')">Visualizar</button>';
                        html += '</div>';
                        html += '<div class="progress-bar">';
                        html += '<div class="progress-bar-fill ' + progressClass + '" style="width: ' + progressValue + '%"></div>';
                        html += '</div>';
                        html += '<p style="margin-top: 10px; font-size: 12px; color: #636E72;">Progresso: ' + progressValue + '%</p>';
                        html += '</div>';
                    });
                }

                container.innerHTML = '<button class="btn btn-primary" onclick="openPDIForm()">+ Novo PDI</button>' + html;
            } catch (error) {
                console.error('Erro ao carregar PDIs do gestor/analista:', error);
            }
        }

        async function loadPDIAdmin() {
            const container = document.getElementById('pdiContainer');
            container.innerHTML = '<button class="btn btn-primary" onclick="openPDIForm()">+ Novo PDI</button><div id="pdiList"></div>';

            try {
                const pdis = await cachedGet('pdis:all', () => db.collection('pdis').get());
                const listContainer = document.getElementById('pdiList');
                let html = '';

                if (pdis.empty) {
                    html = '<div class="alert alert-info">Nenhum PDI encontrado.</div>';
                } else {
                    pdis.forEach(doc => {
                        const pdi = doc.data();
                        const progressValue = pdi.status === 'pendente' ? 0 : pdi.status === 'em_andamento' ? 50 : 100;
                        const progressClass = 'progress-' + progressValue;

                        html += '<div class="card">';
                        html += '<div class="card-header">';
                        html += '<div>';
                        html += '<div class="card-title">' + pdi.titulo + '</div>';
                        html += '<span class="badge badge-' + pdi.status + '">' + pdi.status + '</span>';
                        html += '</div>';
                        html += '<button class="btn btn-primary btn-small" onclick="viewPDI(\'' + doc.id + '\')">Visualizar</button>';
                        html += '</div>';
                        html += '<div class="progress-bar">';
                        html += '<div class="progress-bar-fill ' + progressClass + '" style="width: ' + progressValue + '%"></div>';
                        html += '</div>';
                        html += '<p style="margin-top: 10px; font-size: 12px; color: #636E72;">Progresso: ' + progressValue + '%</p>';
                        html += '</div>';
                    });
                }

                listContainer.innerHTML = html;
            } catch (error) {
                console.error('Erro ao carregar PDIs do admin:', error);
            }
        }

        function openPDIForm() {
            let html = `
                <div class="pdi-form-section">
                    <label>Título do PDI:</label>
                    <input type="text" id="pdiTitulo" placeholder="Título do plano de desenvolvimento">
                </div>
                <div class="pdi-form-section">
                    <label>Descrição:</label>
                    <textarea id="pdiDescricao" placeholder="Descreva os objetivos do PDI"></textarea>
                </div>
                <div class="pdi-form-section">
                    <label>Colaborador:</label>
                    <select id="pdiColaborador">
                        <option value="">-- Selecione um colaborador --</option>
                    </select>
                </div>
                <div class="pdi-form-section">
                    <label>Status:</label>
                    <select id="pdiStatus">
                        <option value="pendente">Pendente</option>
                        <option value="em_andamento">Em Andamento</option>
                        <option value="concluido">Concluído</option>
                    </select>
                </div>
            `;

            openModal('Novo PDI', html, [
                { text: 'Cancelar', onclick: 'closeModal()', class: 'btn-secondary' },
                { text: 'Salvar', onclick: 'savePDI()', class: 'btn-primary' }
            ]);

            // Load collaborators
            loadPDIColaboradorSelect();
        }

        async function loadPDIColaboradorSelect() {
            try {
                const select = document.getElementById('pdiColaborador');
                if (!select) return;

                const usuarios = await cachedGet('usuarios:all', () => db.collection('usuarios').get());
                usuarios.forEach(doc => {
                    if (doc.id !== currentUser.id) {
                        const option = document.createElement('option');
                        option.value = doc.id;
                        const u = doc.data();
                        option.textContent = u.nome + ' (' + (u.perfil || '') + ')';
                        select.appendChild(option);
                    }
                });
            } catch (error) {
                console.error('Erro ao carregar colaboradores:', error);
            }
        }

        async function savePDI() {
            const titulo = document.getElementById('pdiTitulo').value;
            const descricao = document.getElementById('pdiDescricao').value;
            const colaboradorId = document.getElementById('pdiColaborador').value;
            const status = document.getElementById('pdiStatus').value;

            if (!titulo || !colaboradorId) {
                alert('Preencha todos os campos obrigatórios');
                return;
            }

            try {
                await db.collection('pdis').add({
                    titulo: titulo,
                    descricao: descricao,
                    colaborador_id: colaboradorId,
                    criador_id: currentUser.id,
                    status: status,
                    data_criacao: new Date(),
                    atualizacoes: []
                });
                invalidateCache('pdis:');

                alert('PDI criado com sucesso!');
                closeModal();
                loadPDI();
            } catch (error) {
                console.error('Erro ao criar PDI:', error);
                alert('Erro ao criar PDI: ' + error.message);
            }
        }

        async function viewPDI(pdiId) {
            try {
                const doc = await db.collection('pdis').doc(pdiId).get();
                const pdi = doc.data();

                let html = `
                    <div class="pdi-form-section">
                        <strong>Título:</strong> ${pdi.titulo}
                    </div>
                    <div class="pdi-form-section">
                        <strong>Descrição:</strong> ${pdi.descricao}
                    </div>
                    <div class="pdi-form-section">
                        <strong>Status:</strong> <span class="badge badge-${pdi.status}">${pdi.status}</span>
                    </div>
                    <div class="pdi-form-section">
                        <strong>Data de Criação:</strong> ${pdi.data_criacao ? new Date(pdi.data_criacao).toLocaleDateString('pt-BR') : 'N/A'}
                    </div>
                `;

                // Show updates if user is the collaborator or a gestor/analista viewing their team
                if (currentUser.perfil === 'colaborador' || currentUser.perfil === 'gestor' || currentUser.perfil === 'analista' || currentUser.perfil === 'admin') {
                    html += '<h4 style="margin-top: 20px; margin-bottom: 10px;">Atualizações de Progresso</h4>';

                    if (pdi.atualizacoes && pdi.atualizacoes.length > 0) {
                        pdi.atualizacoes.forEach(update => {
                            html += '<div class="update-item">';
                            html += '<strong>' + update.autor + '</strong> - ' + (update.data ? new Date(update.data).toLocaleDateString('pt-BR') : '') + '<br>';
                            html += update.texto;
                            html += '</div>';
                        });
                    } else {
                        html += '<p style="color: #636E72;">Nenhuma atualização ainda.</p>';
                    }

                    // Allow adding updates if user is the collaborator
                    if (currentUser.id === pdi.colaborador_id || currentUser.perfil === 'admin') {
                        html += '<div class="pdi-form-section" style="margin-top: 20px;">';
                        html += '<label>Adicionar Atualização:</label>';
                        html += '<textarea id="novaAtualizacao" placeholder="Descreva o progresso..." style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; min-height: 80px;"></textarea>';
                        html += '<button class="btn btn-primary" onclick="addAtualizacaoPDI(\'' + pdiId + '\')" style="margin-top: 10px; width: auto; padding: 8px 16px;">Adicionar Atualização</button>';
                        html += '</div>';
                    }
                }

                openModal('Visualizar PDI: ' + pdi.titulo, html, [
                    { text: 'Fechar', onclick: 'closeModal()', class: 'btn-secondary' },
                    { text: 'Editar', onclick: 'editPDI("' + pdiId + '")', class: 'btn-primary' }
                ]);
            } catch (error) {
                console.error('Erro ao visualizar PDI:', error);
                alert('Erro ao visualizar PDI: ' + error.message);
            }
        }

        async function addAtualizacaoPDI(pdiId) {
            const texto = document.getElementById('novaAtualizacao').value;

            if (!texto.trim()) {
                alert('Digite uma atualização');
                return;
            }

            try {
                const doc = await db.collection('pdis').doc(pdiId).get();
                const pdi = doc.data();
                const atualizacoes = pdi.atualizacoes || [];

                atualizacoes.push({
                    autor: currentUser.nome,
                    texto: texto,
                    data: new Date()
                });

                await db.collection('pdis').doc(pdiId).update({
                    atualizacoes: atualizacoes
                });
                invalidateCache('pdis:');

                alert('Atualização adicionada com sucesso!');
                closeModal();
                viewPDI(pdiId);
            } catch (error) {
                console.error('Erro ao adicionar atualização:', error);
                alert('Erro: ' + error.message);
            }
        }

        function editPDI(pdiId) {
            closeModal();
            // Open edit form
        }

        async function deletePDI(pdiId) {
            if (!confirm('Tem certeza que deseja deletar este PDI?')) {
                return;
            }

            try {
                await db.collection('pdis').doc(pdiId).delete();
                invalidateCache('pdis:');
                alert('PDI deletado com sucesso!');
                loadPDI();
            } catch (error) {
                console.error('Erro ao deletar PDI:', error);
                alert('Erro ao deletar: ' + error.message);
            }
        }

        function closePDIForm() {
            closeModal();
        }

        function openModal(title, body, buttons) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = body;

            const buttonsContainer = document.getElementById('modalButtons');
            buttonsContainer.innerHTML = '';

            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.className = 'btn ' + btn.class;
                button.textContent = btn.text;
                button.onclick = () => {
                    eval(btn.onclick);
                };
                buttonsContainer.appendChild(button);
            });

            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
    </script>
</body>
</html>
