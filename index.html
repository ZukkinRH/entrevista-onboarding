<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Desenvolvimento</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --primary: #D42027;
            --primary-light: #E85B5B;
            --primary-dark: #B01A20;
            --secondary: #333333;
            --danger: #D63031;
            --warning: #FDCB6E;
            --info: #0984E3;
            --light: #F8F8F8;
            --dark: #2D2D2D;
            --border: #E0E0E0;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--dark);
            min-height: 100vh;
        }

        /* Login Styles */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-box h1 {
            color: var(--primary);
            margin-bottom: 10px;
            text-align: center;
        }

        .login-box p {
            color: #636E72;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(212, 32, 39, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: #00A087;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #BE2C15;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }

        .forgot-password-link {
            display: block;
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
        }

        .forgot-password-link a {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .forgot-password-link a:hover {
            text-decoration: underline;
        }

        /* Main App Styles */
        .app-container {
            display: flex;
            min-height: 100vh;
            background: var(--light);
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .sidebar-header h2 {
            font-size: 18px;
            color: var(--primary);
        }

        .user-info {
            margin-bottom: 30px;
            padding: 15px;
            background: var(--light);
            border-radius: 8px;
            font-size: 13px;
        }

        .user-info p {
            margin: 5px 0;
            color: #636E72;
        }

        .user-info strong {
            color: var(--dark);
        }

        .nav-menu {
            list-style: none;
        }

        .nav-menu li {
            margin-bottom: 8px;
        }

        .nav-menu a {
            display: block;
            padding: 12px 16px;
            border-radius: 6px;
            color: #636E72;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .nav-menu a:hover {
            background: var(--light);
            color: var(--primary);
        }

        .nav-menu a.active {
            background: var(--primary);
            color: white;
            font-weight: 600;
        }

        .logout-btn {
            width: 100%;
            margin-top: 20px;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .content-header {
            margin-bottom: 30px;
        }

        .content-header h1 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            gap: 20px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: none;
            border-bottom: 3px solid transparent;
            color: #636E72;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-primary {
            background: rgba(212, 32, 39, 0.2);
            color: var(--primary);
        }

        .badge-secondary {
            background: rgba(51, 51, 51, 0.1);
            color: var(--secondary);
        }

        .badge-danger {
            background: rgba(214, 48, 49, 0.2);
            color: var(--danger);
        }

        .badge-warning {
            background: rgba(253, 203, 110, 0.2);
            color: #D68910;
        }

        .badge-pendente {
            background: rgba(253, 203, 110, 0.2);
            color: #D68910;
        }

        .badge-em_andamento {
            background: rgba(9, 132, 227, 0.2);
            color: var(--info);
        }

        .badge-concluido {
            background: rgba(0, 184, 148, 0.2);
            color: #00B894;
        }

        .badge-cancelado {
            background: rgba(214, 48, 49, 0.2);
            color: var(--danger);
        }

        .pdi-form {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .pdi-form-section {
            margin-bottom: 20px;
        }

        .pdi-form-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .pdi-form-section input,
        .pdi-form-section textarea,
        .pdi-form-section select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .pdi-form-section textarea {
            resize: vertical;
            min-height: 80px;
        }

        .pdi-form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .pdi-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .pdi-table th {
            background: var(--light);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--dark);
            font-size: 13px;
            border-bottom: 2px solid var(--border);
        }

        .pdi-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .pdi-table tr:hover {
            background: var(--light);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th {
            background: var(--light);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--dark);
            font-size: 13px;
            border-bottom: 2px solid var(--border);
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .table tr:hover {
            background: var(--light);
        }

        .form-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .form-section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .question-group {
            margin-bottom: 25px;
        }

        .question-label {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 10px;
            display: block;
        }

        .question-help {
            font-size: 12px;
            color: #636E72;
            margin-bottom: 8px;
        }

        .scale-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .scale-btn {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            min-width: 45px;
            text-align: center;
        }

        .scale-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .scale-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .nps-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nps-btn {
            width: 45px;
            height: 45px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nps-btn:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .nps-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .textárea-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
        }

        .textárea-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(212, 32, 39, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: 400;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-item input[type="radio"] {
            cursor: pointer;
        }

        .radio-item label {
            margin: 0;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            color: var(--primary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #636E72;
        }

        .close-btn:hover {
            color: var(--dark);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .empty-staté {
            text-align: center;
            padding: 60px 20px;
            color: #636E72;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .empty-staté p {
            font-size: 16px;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: rgba(0, 184, 148, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(0, 184, 148, 0.3);
        }

        .alert-error {
            background: rgba(214, 48, 49, 0.1);
            color: var(--danger);
            border: 1px solid rgba(214, 48, 49, 0.3);
        }

        .alert-info {
            background: rgba(9, 132, 227, 0.1);
            color: var(--info);
            border: 1px solid rgba(9, 132, 227, 0.3);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .collaborator-select {
            margin-bottom: 20px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .collaborator-select label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .collaborator-select select {
            width: 100%;
            max-width: 300px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
        }

        .sidebar-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .sidebar-toggle:hover {
            background: var(--light);
        }
        .sidebar.collapsed {
            width: 60px;
            padding: 20px 10px;
        }
        .sidebar.collapsed .sidebar-header h2,
        .sidebar.collapsed .user-info,
        .sidebar.collapsed .nav-menu a span,
        .sidebar.collapsed .logout-btn span {
            display: none;
        }
        .sidebar.collapsed .nav-menu a {
            text-align: center;
            padding: 12px 8px;
            font-size: 18px;
        }
        .sidebar.collapsed .sidebar-header {
            justify-content: center;
        }
        .sidebar {
            transition: width 0.3s ease;
        }

@media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 15px;
            }

            .sidebar.collapsed {
                width: 0;
                padding: 0;
                overflow: hidden;
            }

            .user-info {
                display: none;
            }

            .nav-menu {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }

            .nav-menu li {
                margin: 0;
            }

            .main-content {
                padding: 20px;
            }

            .tabs {
                gap: 10px;
            }

            .tab-btn {
                padding: 10px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h1>Zukkin RH</h1>
        <p>Plano de Desenvolvimento</p>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="emailInput">Email</label>
                <input type="email" id="emailInput" required>
            </div>
            <div class="form-group">
                <label for="senhaInput">Senha</label>
                <input type="password" id="senhaInput" required>
            </div>
            <button type="submit" class="btn btn-primary">ENTRAR</button>
            <div class="forgot-password-link">
                <a onclick="showForgotPassword()">Esqueceu sua senha?</a>
            </div>
        </form>
    </div>
</div>

<div id="appScreen" class="app-container" style="display: none;">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Menu</h2>
            <button class="sidebar-toggle" onclick="toggleSidebar()" title="Minimizar menu">☰</button>
        </div>
        <div class="user-info">
            <p><strong>Usuário:</strong></p>
            <p id="userNameDisplay"></p>
            <p id="userRoleDisplay" style="margin-top: 10px;"></p>
        </div>
        <ul class="nav-menu" id="navMenu"></ul>
        <button class="btn btn-danger logout-btn" onclick="handleLogout()">Sair</button>
    </div>

    <div class="main-content">
        <div class="content-header">
            <h1>Plano de Desenvolvimento</h1>
        </div>

        <!-- Questionários do Colaborador Tab -->
        <div id="questionnairesTab" class="tab-content">
            <div class="filters">
                <button class="filter-btn active" onclick="filterSurveys('all')">Todos</button>
                <button class="filter-btn" onclick="filterSurveys('experiencia_45_colab')">Experiência 45 Dias</button>
                <button class="filter-btn" onclick="filterSurveys('desempenho_90_colab')">Desempenho 90 Dias</button>
            </div>
            <div id="questionnairesContainer"></div>
        </div>

        <!-- Avaliações da Empresa Tab -->
        <div id="evaluationsTab" class="tab-content">
            <div class="collaborator-select">
                <label for="collaboratorSelect">Selecione o Colaborador:</label>
                <select id="collaboratorSelect" onchange="loadEvaluationsForCollaborator()">
                    <option value="">-- Selecione um colaborador --</option>
                </select>
            </div>
            <div class="filters">
                <button class="filter-btn active" onclick="filterEvaluations('all')">Todos</button>
                <button class="filter-btn" onclick="filterEvaluations('experiencia_45_empresa')">Experiência 45 Dias</button>
                <button class="filter-btn" onclick="filterEvaluations('desempenho_90_empresa')">Desempenho 90 Dias</button>
            </div>
            <div id="evaluationsContainer"></div>
        </div>

        <!-- Meus Subordinados Tab -->
        <div id="subordinatesTab" class="tab-content">
            <div id="subordinatesContainer"></div>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboardTab" class="tab-content">
            <div id="dashboardContainer"></div>
        </div>

        <!-- Liberar Pesquisas Tab (Admin) -->
        <div id="liberacoesTab" class="tab-content">
            <div id="liberacoesContainer"></div>
        </div>

        <!-- Pesquisas Tab -->
        <div id="pesquisasTab" class="tab-content">
            <div id="pesquisasContainer"></div>
        </div>

        <!-- Colaboradores Tab -->
        <div id="colaboradoresTab" class="tab-content">
            <div id="colaboradoresContainer"></div>
        </div>

        <!-- Usuários Tab -->
        <div id="usuariosTab" class="tab-content">
            <div class="card" style="margin-bottom: 24px;">
                <div class="card-header"><h2 style="color: var(--primary);">Novo Usuário</h2></div>
                <form id="newUserForm" style="padding: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="form-group">
                            <label>Nome Completo</label>
                            <input type="text" id="newUserNome" required>
                        </div>
                        <div class="form-group">
                            <label>E-mail</label>
                            <input type="email" id="newUserEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Perfil de Acesso</label>
                            <select id="newUserPerfil" required>
                                <option value="">Selecione...</option>
                                <option value="admin">Administrador</option>
                                <option value="gestor">Gestor</option>
                                <option value="analista">Analista</option>
                                <option value="diretoria">Diretoria</option>
                                <option value="colaborador">Colaborador</option>
                            </select>
                        </div>

async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('emailInput').value.trim();
    const senha = document.getElementById('senhaInput').value;

    try {
        console.log('Tentando login com:', email);
        const snapshot = await db.collection('usuarios').where('email', '==', email).get();

        if (snapshot.empty) {
            alert('Usuário não encontrado. Verifique o e-mail digitado.');
            return;
        }

        const usuario = snapshot.docs[0].data();
        usuario.id = snapshot.docs[0].id;

        const senhaHash = await hashSenha(senha);
        console.log('Hash gerado para comparação');

        if (usuario.senha !== senhaHash) {
            alert('Senha incorreta.');
            return;
        }

        if (usuario.ativo === false) {
            alert('Usuário inativo. Contate o administrador.');
            return;
        }

        currentUser = usuario;
        sessionStorage.setItem('userSession', JSON.stringify(currentUser));
        showAppScreen();
    } catch (error) {
        console.error('Erro no login:', error);
        alert('Erro ao conectar com o servidor. Verifique sua conexão e tente novamente.\n\nDetalhes: ' + error.message);
    }
}

async function showForgotPassword() {
    const email = prompt('Digite seu email:');
    if (!email) return;

    try {
        const snapshot = await db.collection('usuarios').where('email', '==', email.trim()).get();
        if (snapshot.empty) {
            alert('Email não encontrado');
            return;
        }

        const docId = snapshot.docs[0].id;
        const usuario = snapshot.docs[0].data();
        const novaSenha = generatePassword();
        const senhaHash = await hashSenha(novaSenha);

        await db.collection('usuarios').doc(docId).update({
            senha: senhaHash,
            provisoria: true
        });
        enviarEmailSenha(usuario.nome, usuario.email, novaSenha);
    } catch (error) {
        console.error('Erro:', error);
        alert('Erro ao processar recuperação de senha: ' + error.message);
    }
}

function generatePassword(length = 8) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let password = '';
    for (let i = 0; i < length; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return password;
}

function enviarEmailSenha(nome, email, novaSenha) {
    const templateParams = {
        to_name: nome,
        to_email: email,
        subject: 'Plano de Desenvolvimento - Recuperacao de Senha',
        nova_senha: novaSenha
    };

    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
        .then(() => {
            alert('Email com nova senha enviado para ' + email);
        })
        .catch(() => {
            alert('Erro ao enviar email. Sua senha temporária e: ' + novaSenha);
        });
}

function buildNavigation() {
    const navMenu = document.getElementById('navMenu');
    navMenu.innerHTML = '';

    const tabs = TABS[currentUser.perfil] || [];
    tabs.forEach((tab, index) => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        const icon = navIcons[tab.key] || '•';
        const span = document.createElement('span');
        span.textContent = tab.label;
        a.appendChild(document.createTextNode(icon + ' '));
        a.appendChild(span);
        a.onclick = () => switchTab(tab.id, a);
        if (index === 0) a.classList.add('active');
        li.appendChild(a);
        navMenu.appendChild(li);
    });

    switchTab(tabs[0].id, navMenu.querySelector('a'));
}

function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('collapsed');
}

function switchTab(tabId, element) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.querySelectorAll('.nav-menu a').forEach(link => link.classList.remove('active'));

    const tabElement = document.getElementById(tabId);
    if (tabElement) {
        tabElement.classList.add('active');
        element.classList.add('active');

        if (tabId === 'questionnairesTab') loadQuestionnaires();
        else if (tabId === 'evaluationsTab') loadEvaluations();
        else if (tabId === 'subordinatesTab') loadSubordinates();
        else if (tabId === 'dashboardTab') loadDashboard();
        else if (tabId === 'liberacoesTab') loadLiberacoes();
        else if (tabId === 'pesquisasTab') loadPesquisas();
        else if (tabId === 'colaboradoresTab') loadColaboradores();
        else if (tabId === 'usuariosTab') loadUsuarios();
        else if (tabId === 'respostasTab') loadRespostas();
        else if (tabId === 'gestoresTab') loadAvaliadoresTab();
        else if (tabId === 'pesquisasColabTab') loadPesquisasColabTab();
        else if (tabId === 'pdiTab') loadPDI();
    }
}

async function loadQuestionnaires() {
    const container = document.getElementById('questionnairesContainer');
    container.innerHTML = '<div class="loading"></div>';

    try {
        const liberacoes = await db.collection('liberacoes')
            .where('colaborador_id', '==', currentUser.id)
            .get();

        const liberadosTipos = {};
        liberacoes.forEach(doc => {
            liberadosTipos[doc.data().tipo_pesquisa] = true;
        });

        if (Object.keys(liberadosTipos).length === 0) {
            container.innerHTML = '<div class="alert alert-info">Nenhum questionario disponivel no momento.</div>';
            return;
        }

        let html = '';
        const tiposOrdenados = ['experiencia_45_colab', 'desempenho_90_colab'];

        for (const tipo of tiposOrdenados) {
            if (liberadosTipos[tipo]) {
                const template = SURVEY_TEMPLATES[tipo];
                html += '<div class="card" data-survey-type="' + tipo + '">';
                html += '<div class="card-header">';
                html += '<div>';
                html += '<div class="card-title">' + template.nome + '</div>';
                html += '<div style="font-size: 12px; color: #636E72; margin-top: 5px;">Responda as questoes abaixo</div>';
                html += '</div>';
                html += '<button class="btn btn-primary btn-small" onclick="openSurveyModal(\'' + tipo + '\')">Responder</button>';
                html += '</div>';
                html += '</div>';
            }
        }

        if (html === '') {
            container.innerHTML = '<div class="alert alert-info">Nenhum questionario disponivel no momento.</div>';
        } else {
            container.innerHTML = html;
        }
    } catch (error) {
        console.error('Erro ao carregar questionarios:', error);
        container.innerHTML = '<div class="alert alert-error">Erro ao carregar questionarios</div>';
    }
}

function openSurveyModal(tipo) {
    const template = SURVEY_TEMPLATES[tipo];
    let html = '';

    template.secoes.forEach(secao => {
        html += '<div class="form-section">';
        html += '<div class="form-section-title">' + secao.titulo + '</div>';
        secao.questoes.forEach(q => {
            html += renderQuestion(q, tipo);
        });
        html += '</div>';
    });

    openModal(template.nome, html, [
        { text: 'Cancelar', onclick: 'closeModal()', class: 'btn-secondary' },
        { text: 'Enviar', onclick: 'saveSurvey("' + tipo + '")', class: 'btn-primary' }
    ]);
}

function renderQuestion(question, surveyType) {
    const questionId = surveyType + '_' + question.id;

    if (question.tipo === 'escala') {
        let html = '<div class="question-group">';
        html += '<label class="question-label">' + question.texto + '</label>';
        html += '<div class="scale-buttons">';
        for (let n = 1; n <= 5; n++) {
            html += '<button type="button" class="scale-btn" onclick="selectScale(\'' + questionId + '\', ' + n + ')">' + n + '</button>';
        }
        html += '</div>';
        html += '<input type="hidden" id="' + questionId + '" value="">';
        html += '</div>';
        return html;
    } else if (question.tipo === 'sim_nao') {
        let html = '<div class="question-group">';
        html += '<label class="question-label">' + question.texto + '</label>';
        html += '<div class="radio-group">';
        html += '<div class="radio-item">';
        html += '<input type="radio" id="' + questionId + '_yes" name="' + questionId + '" value="sim" onchange="selectOption(\'' + questionId + '\', \'sim\')">';
        html += '<label for="' + questionId + '_yes">Sim</label>';
        html += '</div>';
        html += '<div class="radio-item">';
        html += '<input type="radio" id="' + questionId + '_no" name="' + questionId + '" value="nao" onchange="selectOption(\'' + questionId + '\', \'nao\')">';
        html += '<label for="' + questionId + '_no">Nao</label>';
        html += '</div>';
        html += '</div>';
        html += '<input type="hidden" id="' + questionId + '" value="">';
        html += '</div>';
        return html;
    } else if (question.tipo === 'nps') {
        let html = '<div class="question-group">';
        html += '<label class="question-label">' + question.texto + '</label>';
        html += '<div class="nps-buttons">';
        for (let i = 0; i <= 10; i++) {
            html += '<button type="button" class="nps-btn" onclick="selectNps(\'' + questionId + '\', ' + i + ')">' + i + '</button>';
        }
        html += '</div>';
        html += '<input type="hidden" id="' + questionId + '" value="">';
        html += '</div>';
        return html;
    } else if (question.tipo === 'texto') {
        let html = '<div class="question-group">';
        html += '<label class="question-label">' + question.texto + '</label>';
        html += '<textárea class="textárea-input" id="' + questionId + '" placeholder="Suas respostas aqui..."></textárea>';
        html += '</div>';
        return html;
    }

    return '';
}

function selectScale(questionId, value) {
    document.getElementById(questionId).value = value;
    const buttons = document.querySelectorAll('button[onclick*="' + questionId + '"]');
    buttons.forEach(btn => btn.classList.remove('selected'));
    event.target.classList.add('selected');
}

function selectNps(questionId, value) {
    document.getElementById(questionId).value = value;
    const buttons = document.querySelectorAll('button[onclick*="' + questionId + '"]');
    buttons.forEach(btn => btn.classList.remove('selected'));
    event.target.classList.add('selected');
}

function selectOption(questionId, value) {
    document.getElementById(questionId).value = value;
}

async function saveSurvey(tipo) {
    const template = SURVEY_TEMPLATES[tipo];
    const respostas = {};

    template.secoes.forEach(secao => {
        secao.questoes.forEach(questao => {
            const inputId = tipo + '_' + questao.id;
            const input = document.getElementById(inputId);
            if (input) {

    try {
        await db.collection('respostas').add({
            usuario_id: currentUser.id,

async function toggleLiberacao(colaboradorId, tipo, checked) {

        if (checked) {
            await db.collection('liberacoes').add({
                colaborador_id: colaboradorId,
                tipo_pesquisa: tipo,
                liberado_por: currentUser.email,
                data_liberacao: new Date()
            });
        } else {
            const query = await db.collection('liberacoes')
                .where('colaborador_id', '==', colaboradorId)
                .where('tipo_pesquisa', '==', tipo)
                .get();

            query.forEach(doc => {
                db.collection('liberacoes').doc(doc.id).delete();
            });
        }
    } catch (error) {

    }

async function loadUsuarios() {
    const container = document.getElementById('usuariosContainer');
    container.innerHTML = '<div class="loading"></div>';

    // Setup form handler
    const form = document.getElementById('newUserForm');
    form.onsubmit = async function(e) {
        e.preventDefault();
        try {
            const nome = document.getElementById('newUserNome').value;
            const email = document.getElementById('newUserEmail').value;
            const perfil = document.getElementById('newUserPerfil').value;
            const setor = document.getElementById('newUserSetor').value;
            const lider = document.getElementById('newUserLider').value;
            const cargo = document.getElementById('newUserCargo').value;

            // Verificar se email já existe
            const existe = await db.collection('usuarios').where('email', '==', email).get();
            if (!existe.empty) {
                alert('Já existe um usuário com este e-mail.');
                return;
            }

            const senhaTemp = 'senha123';
            const senhaHash = await hashSenha(senhaTemp);

            await db.collection('usuarios').add({
                nome, email, senha: senhaHash, perfil, setor, lider, cargo,
                provisoria: true, ativo: true, created_at: new Date()
            });

            alert('Usuário criado com sucesso!\nSenha temporária: ' + senhaTemp);
            form.reset();
            loadUsuarios();
        } catch (error) {
            console.error('Erro ao criar usuário:', error);
            alert('Erro ao criar usuário: ' + error.message);
        }
    };

    try {
        const snapshot = await db.collection('usuarios').get();

        if (snapshot.empty) {
            container.innerHTML = '<div class="alert alert-info">Nenhum usuário registrado.</div>';
            return;
        }

        const perfilLabels = { admin: 'Administrador', gestor: 'Gestor', analista: 'Analista', diretoria: 'Diretoria', colaborador: 'Colaborador' };

        let html = '<div class="card"><div class="card-header"><h2 style="color: var(--primary);">Usuários Cadastrados</h2></div>';
        html += '<table class="table"><thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Setor</th><th>Líder</th><th>Cargo</th><th>Status</th><th>Ações</th></tr></thead><tbody>';

        snapshot.forEach(doc => {
            const u = doc.data();
            const status = u.ativo ? '<span class="badge badge-secondary">Ativo</span>' : '<span class="badge badge-danger">Inativo</span>';
            const perfilLabel = perfilLabels[u.perfil] || u.perfil;
            const toggleLabel = u.ativo ? 'Desativar' : 'Ativar';
            const toggleClass = u.ativo ? 'btn-warning' : 'btn-secondary';

            html += '<tr>';
            html += '<td>' + u.nome + '</td>';
            html += '<td>' + u.email + '</td>';
            html += '<td><span class="badge badge-' + u.perfil + '">' + perfilLabel + '</span></td>';
            html += '<td>' + (u.setor || 'N/A') + '</td>';
            html += '<td>' + (u.lider || 'N/A') + '</td>';
            html += '<td>' + (u.cargo || 'N/A') + '</td>';
            html += '<td>' + status + '</td>';
            html += '<td style="white-space: nowrap;">';
            html += '<button class="btn btn-sm ' + toggleClass + '" onclick="toggleUsuario(\'' + doc.id + '\', ' + u.ativo + ')" style="margin-right:4px;">' + toggleLabel + '</button>';
            html += '<button class="btn btn-sm btn-danger" onclick="deleteUsuario(\'' + doc.id + '\', \'' + u.nome + '\')">Excluir</button>';
            html += '</td>';
            html += '</tr>';
        });

        html += '</tbody></table></div>';
        container.innerHTML = html;
    } catch (error) {
        console.error('Erro ao carregar usuários:', error);
        container.innerHTML = '<div class="alert alert-error">Erro ao carregar usuários</div>';
    }
}

            const data = resposta.data_resposta ? new Date(resposta.data_resposta.toDate()).toLocaleDateString('pt-BR') : 'N/A';

    } catch (error) {
        console.error('Erro ao carregar pesquisas:', error);
        container.innerHTML = '<div class="alert alert-error">Erro ao carregar pesquisas</div>';
    }
}

function openModal(title, body, buttons) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = body;

    let buttonsHtml = '';
    buttons.forEach(btn => {
        buttonsHtml += '<button class="btn ' + btn.class + '" onclick="' + btn.onclick + '" style="margin-left: 10px;">' + btn.text + '</button>';
    });
    document.getElementById('modalButtons').innerHTML = buttonsHtml;
    document.getElementById('modal').classList.add('active');
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
}

async function loadPDI() {
    const container = document.getElementById('pdiContainer');
    container.innerHTML = '<div class="loading"></div>';

    try {
        if (currentUser.perfil === 'admin') {
            await loadPDIAdmin(container);
        } else if (['gestor', 'analista'].includes(currentUser.perfil)) {
            await loadPDIGestorAnalista(container);
        } else if (currentUser.perfil === 'colaborador') {
            await loadPDIColaborador(container);
        } else if (currentUser.perfil === 'diretoria') {
            await loadPDIDiretoria(container);
        }
    } catch (error) {
        console.error('Erro ao carregar PDI:', error);
        container.innerHTML = '<div class="alert alert-error">Erro ao carregar PDI</div>';
    }
}

async function loadPDIAdmin(container) {
    let html = '<div class="card"><div class="card-header">';
    html += '<h2 style="color: var(--primary);">Plano de Desenvolvimento Individual (PDI)</h2>';

async function loadPDIGestorAnalista(container) {
    let html = '<div class="card"><div class="card-header">';
    html += '<h2 style="color: var(--primary);">Plano de Desenvolvimento Individual (PDI)</h2>';
    html += '</div>';
    
    const pdis = await db.collection('pdis')
        .where('colaborador_id', '==', currentUser.id)
        .get();
    
    if (pdis.empty) {
        // Try fetching subordinates' PDIs
        const subordinados = await db.collection('usuarios')
            .where('lider', '==', currentUser.nome)
            .get();
        
        if (subordinados.empty) {
            html += '<div class="alert alert-info" style="margin: 20px;">Nenhum PDI disponível.</div>';
            container.innerHTML = html + '</div>';
            return;
        }
        
        const subordinadoIds = subordinados.docs.map(doc => doc.id);
        if (subordinadoIds.length > 0) {
            const pdiSubordinados = await db.collection('pdis')
                .where('colaborador_id', 'in', subordinadoIds)
                .get();
            
            if (!pdiSubordinados.empty) {
                html += renderPDITable(pdiSubordinados.docs, false);
            } else {
                html += '<div class="alert alert-info" style="margin: 20px;">Nenhum PDI disponível para seus subordinados.</div>';
            }
        }
    } else {
        html += renderPDITable(pdis.docs, false);
    }
    
    html += '</div>';
    container.innerHTML = html;
}

function renderPDITable(docs, showActions = true) {
    let html = '<div style="overflow-x: auto; margin: 20px;"><table class="pdi-table"><thead><tr>';
    html += '<th>Colaborador</th><th>Objetivo</th><th>Prazo</th><th>Status</th>';
    if (showActions) html += '<th>Ações</th>';
    html += '</tr></thead><tbody>';
    
    docs.forEach(doc => {
        const pdi = doc.data();
        const statusBadgeClass = 'badge-' + pdi.status;
        const statusLabel = {
            'pendente': 'Pendente',
            'em_andamento': 'Em Andamento',
            'concluido': 'Concluído',
            'cancelado': 'Cancelado'
        }[pdi.status] || pdi.status;
        
        const prazo = pdi.prazo ? new Date(pdi.prazo).toLocaleDateString('pt-BR') : 'N/A';
        
        html += '<tr>';
        html += '<td>' + pdi.colaborador_nome + '</td>';
        html += '<td>' + pdi.objetivo + '</td>';
        html += '<td>' + prazo + '</td>';
        html += '<td><span class="badge ' + statusBadgeClass + '">' + statusLabel + '</span></td>';
        
        if (showActions && currentUser.perfil === 'admin') {
            html += '<td><button class="btn btn-primary btn-small" onclick="openPDIForm(\'' + doc.id + '\')" style="margin-right: 5px;">Editar</button>';
            html += '<button class="btn btn-danger btn-small" onclick="deletePDI(\'' + doc.id + '\', \'' + pdi.colaborador_nome + '\')">Excluir</button></td>';
        } else {
            html += '<td><button class="btn btn-primary btn-small" onclick="viewPDI(\'' + doc.id + '\')">Ver</button></td>';
        }
        
        html += '</tr>';
    });
    
    html += '</tbody></table></div>';
    return html;
}

async function loadPDIList(container) {
    const listContainer = document.getElementById('pdiListContainer') || container;
    
    try {
        const pdis = await db.collection('pdis').orderBy('created_at', 'desc').get();
        
        if (pdis.empty) {
            listContainer.innerHTML = '<div class="alert alert-info" style="margin: 20px;">Nenhum PDI registrado.</div>';
            return;
        }
        
        let html = renderPDITable(pdis.docs, true);
        if (document.getElementById('pdiListContainer')) {
            document.getElementById('pdiListContainer').innerHTML = html;
        } else {
            listContainer.innerHTML += html;
        }
    } catch (error) {
        console.error('Erro ao carregar lista de PDI:', error);
    }
}

async function savePDI(pdiId = null) {
    const colaboradorSelect = document.getElementById('pdiColaborador');
    const colaboradorId = colaboradorSelect.value;
    const colaboradorNome = colaboradorSelect.options[colaboradorSelect.selectedIndex].dataset.nome;
    
    const pdiData = {
        colaborador_id: colaboradorId,
        colaborador_nome: colaboradorNome,
        objetivo: document.getElementById('pdiObjetivo').value,
        competencias: document.getElementById('pdiCompetencias').value,
        acoes: document.getElementById('pdiAcoes').value,
        prazo: document.getElementById('pdiPrazo').value,
        responsavel: document.getElementById('pdiResponsavel').value,
        status: document.getElementById('pdiStatus').value,
        observacoes: document.getElementById('pdiObservacoes').value,
        updated_at: new Date()
    };
    
    try {
        if (pdiId) {
            await db.collection('pdis').doc(pdiId).update(pdiData);
            alert('PDI atualizado com sucesso!');
        } else {
            pdiData.criado_por = currentUser.email;
            pdiData.created_at = new Date();
            await db.collection('pdis').add(pdiData);
            alert('PDI criado com sucesso!');
        }
        
        closePDIForm();
        loadPDI();
    } catch (error) {
        console.error('Erro ao salvar PDI:', error);
        alert('Erro ao salvar PDI: ' + error.message);
    }
}

async function deletePDI(pdiId, colaboradorNome) {
    if (!confirm('Tem certeza que deseja excluir o PDI de "' + colaboradorNome + '"? Esta ação não pode ser desfeita.')) {
        return;
    }
    
    try {
        await db.collection('pdis').doc(pdiId).delete();
        alert('PDI excluído com sucesso.');
        loadPDI();
    } catch (error) {
        console.error('Erro ao excluir PDI:', error);
        alert('Erro ao excluir PDI: ' + error.message);

// Função auxiliar de hash (compatível com crypto.subtle e CryptoJS)
async function hashSenha(senha) {
    if (typeof CryptoJS !== 'undefined') {
        return CryptoJS.SHA256(senha).toString();
    }
    // Fallback para crypto.subtle (Web Crypto API)
    const encoder = new TextEncoder();
    const data = encoder.encode(senha);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// Criar ou corrigir admin padrão
async function criarAdminPadrao() {
    try {
        const senhaHash = await hashSenha('admin123');
        const snapshot = await db.collection('usuarios').where('email', '==', 'admin@empresa.com').get();

        if (snapshot.empty) {
            await db.collection('usuarios').add({
                nome: 'Administrador',
                email: 'admin@empresa.com',
                senha: senhaHash,
                perfil: 'admin',
                setor: 'Administrativo',
                lider: '',
                cargo: 'Administrador',
                provisoria: false,
                ativo: true,
                created_at: new Date()
            });
            console.log('Admin padrão criado com sucesso');
        } else {
            // Garantir que a senha do admin esteja correta
            const adminDoc = snapshot.docs[0];
            if (adminDoc.data().senha !== senhaHash) {
                await db.collection('usuarios').doc(adminDoc.id).update({ senha: senhaHash });
                console.log('Senha do admin corrigida');
            } else {
                console.log('Admin OK');
            }
        }
    } catch (error) {
        console.error('Erro ao criar admin padrão:', error);
    }
}
